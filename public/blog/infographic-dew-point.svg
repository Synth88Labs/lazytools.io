<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="100 percent relative humidity at 30F feels dry, while 50 percent at 80F feels muggy, because dew point differs. Comfort scale from below 55 comfortable to above 70 tropical.">
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="600" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="44" font-weight="800" fill="#0f172a">Higher humidity % ≠ muggier air</text>

  <!-- left: cold, 100% RH -->
  <rect x="70" y="100" width="480" height="240" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
  <text x="310" y="146" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" font-weight="800" fill="#1e3a8a">COLD MORNING</text>
  <text x="310" y="196" text-anchor="middle" font-family="system-ui, sans-serif" font-size="27" fill="#1e40af">30°F air · 30°F dew point</text>
  <text x="310" y="256" text-anchor="middle" font-family="system-ui, sans-serif" font-size="52" font-weight="800" fill="#2563eb">100% RH</text>
  <text x="310" y="308" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" font-weight="800" fill="#166534">feels CRISP + DRY</text>

  <!-- right: warm, 50% RH -->
  <rect x="650" y="100" width="480" height="240" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="4"/>
  <text x="890" y="146" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" font-weight="800" fill="#991b1b">SUMMER AFTERNOON</text>
  <text x="890" y="196" text-anchor="middle" font-family="system-ui, sans-serif" font-size="27" fill="#b91c1c">80°F air · 60°F dew point</text>
  <text x="890" y="256" text-anchor="middle" font-family="system-ui, sans-serif" font-size="52" font-weight="800" fill="#dc2626">50% RH</text>
  <text x="890" y="308" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" font-weight="800" fill="#991b1b">feels STICKY</text>

  <rect x="70" y="362" width="1060" height="70" rx="14" fill="#0f172a"/>
  <text x="600" y="406" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#f8fafc">RH depends on temperature. Dew point measures actual moisture.</text>

  <text x="600" y="478" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" font-weight="800" fill="#0f172a">DEW POINT COMFORT SCALE</text>

  <rect x="70" y="498" width="252" height="86" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="196" y="534" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" font-weight="800" fill="#166534">below 55°F</text>
  <text x="196" y="566" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" fill="#15803d">comfortable</text>

  <rect x="338" y="498" width="252" height="86" rx="12" fill="#fef9c3" stroke="#ca8a04" stroke-width="3"/>
  <text x="464" y="534" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" font-weight="800" fill="#854d0e">60 – 65°F</text>
  <text x="464" y="566" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" fill="#a16207">sticky</text>

  <rect x="606" y="498" width="252" height="86" rx="12" fill="#ffedd5" stroke="#ea580c" stroke-width="3"/>
  <text x="732" y="534" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" font-weight="800" fill="#9a3412">65 – 70°F</text>
  <text x="732" y="566" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" fill="#c2410c">muggy</text>

  <rect x="874" y="498" width="256" height="86" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
  <text x="1002" y="534" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" font-weight="800" fill="#991b1b">above 70°F</text>
  <text x="1002" y="566" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" fill="#b91c1c">tropical</text>

  <text x="600" y="638" text-anchor="middle" font-family="system-ui, sans-serif" font-size="27" font-weight="700" fill="#334155">High dew point stops sweat evaporating — so you can't cool down.</text>
</svg>
