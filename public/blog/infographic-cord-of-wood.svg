<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="A full cord of wood is 4 feet high by 4 feet deep by 8 feet long, which equals 128 cubic feet. A face cord is 4 feet high and 8 feet long but only one log deep, so for 16-inch logs it is about one-third of a full cord, roughly 42.7 cubic feet.">
  <defs>
    <style>
      .title { font: 800 40px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#0f172a; }
      .sub { font: 600 22px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#64748b; }
      .card { font: 800 30px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#0f172a; }
      .big { font: 800 46px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; }
      .dim { font: 700 24px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#334155; }
      .note { font: 600 22px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#475569; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="700" fill="#fffbf5" />
  <text x="600" y="58" text-anchor="middle" class="title">Full cord vs face cord</text>
  <text x="600" y="92" text-anchor="middle" class="sub">A cord is a stacked measure — 128 cubic feet of wood</text>

  <!-- Full cord card -->
  <rect x="60" y="130" width="520" height="470" rx="18" fill="#fff" stroke="#d6c3a5" stroke-width="3" />
  <text x="320" y="180" text-anchor="middle" class="card">FULL CORD</text>
  <!-- stack drawing -->
  <g stroke="#8a5a2b" stroke-width="2" fill="#c8925a">
    <rect x="150" y="215" width="340" height="150" rx="6" />
  </g>
  <g stroke="#6b4522" stroke-width="2">
    <line x1="150" y1="252" x2="490" y2="252" /><line x1="150" y1="289" x2="490" y2="289" /><line x1="150" y1="326" x2="490" y2="326" />
  </g>
  <text x="320" y="405" text-anchor="middle" class="dim">4 ft high × 4 ft deep × 8 ft long</text>
  <text x="320" y="470" text-anchor="middle" class="big" fill="#a15c1e">128 ft³</text>
  <text x="320" y="510" text-anchor="middle" class="note">the only legal firewood unit</text>
  <text x="320" y="560" text-anchor="middle" class="note">4 × 4 × 8 = 128</text>

  <!-- Face cord card -->
  <rect x="620" y="130" width="520" height="470" rx="18" fill="#fff" stroke="#d6c3a5" stroke-width="3" />
  <text x="880" y="180" text-anchor="middle" class="card">FACE CORD (rick)</text>
  <g stroke="#8a5a2b" stroke-width="2" fill="#c8925a">
    <rect x="770" y="245" width="220" height="90" rx="6" />
  </g>
  <g stroke="#6b4522" stroke-width="2">
    <line x1="770" y1="275" x2="990" y2="275" /><line x1="770" y1="305" x2="990" y2="305" />
  </g>
  <text x="880" y="405" text-anchor="middle" class="dim">4 ft high × 8 ft long × 1 log deep</text>
  <text x="880" y="470" text-anchor="middle" class="big" fill="#b45309">≈ 1/3 cord</text>
  <text x="880" y="510" text-anchor="middle" class="note">16-inch logs ≈ 42.7 ft³</text>
  <text x="880" y="560" text-anchor="middle" class="note">depth = the log length</text>

  <!-- Bottom warning -->
  <rect x="60" y="620" width="1080" height="56" rx="12" fill="#fee2e2" stroke="#fca5a5" stroke-width="2" />
  <text x="600" y="656" text-anchor="middle" class="dim" fill="#991b1b">Always get the price per FULL cord — and measure the wood stacked, not piled.</text>
</svg>
