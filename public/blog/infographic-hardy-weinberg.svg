<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="How Hardy-Weinberg equilibrium works. Two alleles have frequencies p and q that add to 1. The expected genotype frequencies are p squared for homozygous dominant, 2 p q for heterozygotes, and q squared for homozygous recessive, and these three add to 1. To get p and q from observed genotype counts, p equals two times the number of AA plus the number of Aa, all divided by twice the total number of individuals; q is one minus p. You then compare observed counts to the expected counts using a chi-square goodness-of-fit test with one degree of freedom. If the p-value is above 0.05 the population is consistent with equilibrium; below 0.05 there is a significant departure, suggesting selection, non-random mating, migration or drift.">
  <defs>
    <style>
      .h { font: 800 30px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#0f172a; }
      .lab { font: 800 18px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#334155; }
      .sub { font: 500 14px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#64748b; }
      .eq { font: 800 26px Consolas,Menlo,monospace; }
      .mono { font: 700 16px Consolas,Menlo,monospace; fill:#0f172a; }
    </style>
  </defs>

  <text x="600" y="42" text-anchor="middle" class="h">📊 Hardy–Weinberg: p² + 2pq + q² = 1</text>

  <!-- allele freqs -->
  <g transform="translate(60 74)">
    <rect x="0" y="0" width="520" height="80" rx="14" fill="#eff6ff" stroke="#1d87f1" stroke-width="2"/>
    <text x="20" y="32" class="lab" fill="#1e3a8a">Two allele frequencies add to 1</text>
    <text x="20" y="62" class="eq" fill="#0f172a">p + q = 1</text>
  </g>
  <!-- from counts -->
  <g transform="translate(620 74)">
    <rect x="0" y="0" width="520" height="80" rx="14" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
    <text x="20" y="30" class="lab" fill="#065f46">From observed genotype counts</text>
    <text x="20" y="60" class="mono">p = (2·AA + Aa) / (2·N)   ·   q = 1 − p</text>
  </g>

  <!-- expected genotypes -->
  <text x="600" y="196" text-anchor="middle" class="lab">Expected genotype frequencies</text>
  <g transform="translate(120 210)">
    <rect x="0" y="0" width="300" height="90" rx="12" fill="#dbeafe"/><text x="150" y="40" text-anchor="middle" class="eq" fill="#1e3a8a">p²</text><text x="150" y="70" text-anchor="middle" class="sub" fill="#1e3a8a">homozygous dominant (AA)</text>
  </g>
  <g transform="translate(450 210)">
    <rect x="0" y="0" width="300" height="90" rx="12" fill="#e0f2fe"/><text x="150" y="40" text-anchor="middle" class="eq" fill="#0369a1">2pq</text><text x="150" y="70" text-anchor="middle" class="sub" fill="#0369a1">heterozygous (Aa)</text>
  </g>
  <g transform="translate(780 210)">
    <rect x="0" y="0" width="300" height="90" rx="12" fill="#fee2e2"/><text x="150" y="40" text-anchor="middle" class="eq" fill="#991b1b">q²</text><text x="150" y="70" text-anchor="middle" class="sub" fill="#991b1b">homozygous recessive (aa)</text>
  </g>

  <!-- chi-square test -->
  <g transform="translate(120 330)">
    <rect x="0" y="0" width="960" height="86" rx="14" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="24" y="34" class="lab" fill="#5b21b6">Test it: χ² goodness-of-fit (1 degree of freedom)</text>
    <text x="24" y="64" class="mono">χ² = Σ (observed − expected)² / expected   →   compare observed counts to p², 2pq, q²</text>
  </g>

  <!-- verdict -->
  <g transform="translate(120 436)">
    <rect x="0" y="0" width="470" height="70" rx="12" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
    <text x="235" y="30" text-anchor="middle" class="lab" fill="#065f46">p-value &gt; 0.05</text>
    <text x="235" y="54" text-anchor="middle" class="sub">✓ consistent with equilibrium</text>
  </g>
  <g transform="translate(610 436)">
    <rect x="0" y="0" width="470" height="70" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="235" y="30" text-anchor="middle" class="lab" fill="#991b1b">p-value ≤ 0.05</text>
    <text x="235" y="54" text-anchor="middle" class="sub">✗ significant departure</text>
  </g>

  <rect x="120" y="524" width="960" height="70" rx="14" fill="#153056"/>
  <text x="600" y="556" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="16" font-weight="800" fill="#ffffff">A departure from equilibrium means an assumption is broken —</text>
  <text x="600" y="580" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="15" font-weight="700" fill="#7ef0c0">selection, non-random mating, migration, mutation, or genetic drift.</text>
</svg>
