<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Splitting an L-shaped room into two rectangles: A is 12 by 8 feet = 96 square feet, B is 4 by 6 feet = 24 square feet, total 120 square feet.">
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="600" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="44" font-weight="800" fill="#0f172a">Odd room? Split it into rectangles.</text>
  <text x="600" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" fill="#475569">Find each area, then add them up.</text>

  <!-- L-shape made of two rectangles -->
  <!-- Rectangle A: big -->
  <rect x="180" y="180" width="440" height="300" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
  <!-- Rectangle B: small, attached to the right -->
  <rect x="620" y="330" width="220" height="150" fill="#bbf7d0" stroke="#16a34a" stroke-width="4"/>

  <text x="400" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="40" font-weight="800" fill="#1e3a8a">A</text>
  <text x="400" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" fill="#1e40af">12 × 8 ft</text>
  <text x="400" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" font-weight="700" fill="#1e40af">= 96 ft²</text>

  <text x="730" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="36" font-weight="800" fill="#166534">B</text>
  <text x="730" y="432" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" fill="#15803d">4 × 6 ft</text>
  <text x="730" y="465" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#15803d">= 24 ft²</text>

  <!-- Total -->
  <rect x="180" y="540" width="840" height="110" rx="16" fill="#0f172a"/>
  <text x="600" y="608" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42" font-weight="800" fill="#f8fafc">96 ft² + 24 ft² = 120 ft²</text>

  <!-- side note -->
  <text x="1000" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" fill="#64748b">area =</text>
  <text x="1000" y="266" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" font-weight="700" fill="#334155">length × width</text>
</svg>
