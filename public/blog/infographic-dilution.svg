<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="How the dilution equation works. C1 V1 equals C2 V2 says the amount of solute is conserved, so stock concentration times stock volume equals final concentration times final volume. To find how much stock you need, rearrange to V1 equals C2 V2 divided by C1. Worked example: to make 100 millilitres of 1x from a 10x stock, V1 equals 1 times 100 divided by 10, which is 10 millilitres of stock plus 90 millilitres of diluent. A serial dilution repeats a fixed fold-dilution step by step, giving an exponential series such as one to ten, one to a hundred, one to a thousand. Keep the same units on both sides.">
  <defs>
    <style>
      .h { font: 800 30px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#0f172a; }
      .lab { font: 800 18px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#334155; }
      .sub { font: 500 14px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#64748b; }
      .eq { font: 800 30px Consolas,Menlo,monospace; }
      .mono { font: 700 17px Consolas,Menlo,monospace; fill:#0f172a; }
    </style>
  </defs>

  <text x="600" y="42" text-anchor="middle" class="h">🧪 The dilution equation: C₁V₁ = C₂V₂</text>

  <!-- equation -->
  <g transform="translate(300 74)">
    <rect x="0" y="0" width="600" height="86" rx="14" fill="#eff6ff" stroke="#1d87f1" stroke-width="2"/>
    <text x="300" y="42" text-anchor="middle" class="eq" fill="#1e3a8a">C₁·V₁ = C₂·V₂</text>
    <text x="300" y="70" text-anchor="middle" class="sub">stock conc × stock vol = final conc × final vol  (solute is conserved)</text>
  </g>

  <!-- rearrange -->
  <text x="600" y="196" text-anchor="middle" class="lab">To find how much stock you need, rearrange:</text>
  <g transform="translate(430 210)">
    <rect x="0" y="0" width="340" height="60" rx="12" fill="#0f172a"/>
    <text x="170" y="40" text-anchor="middle" font-family="Consolas,monospace" font-size="24" font-weight="800" fill="#7ef0c0">V₁ = C₂·V₂ / C₁</text>
  </g>

  <!-- worked example -->
  <text x="600" y="320" text-anchor="middle" class="lab">Example — make 100 mL of 1× from a 10× stock</text>
  <g transform="translate(180 340)">
    <rect x="0" y="0" width="250" height="90" rx="12" fill="#dbeafe"/>
    <text x="125" y="40" text-anchor="middle" class="mono" fill="#1e3a8a">V₁ = 1×100 / 10</text>
    <text x="125" y="70" text-anchor="middle" font-family="Consolas,monospace" font-size="22" font-weight="800" fill="#1e3a8a">10 mL stock</text>
  </g>
  <text x="452" y="392" text-anchor="middle" class="eq" fill="#334155">+</text>
  <g transform="translate(490 340)">
    <rect x="0" y="0" width="250" height="90" rx="12" fill="#dcfce7"/>
    <text x="125" y="40" text-anchor="middle" class="sub" fill="#065f46">top up to 100 mL</text>
    <text x="125" y="70" text-anchor="middle" font-family="Consolas,monospace" font-size="22" font-weight="800" fill="#065f46">90 mL diluent</text>
  </g>
  <text x="762" y="392" text-anchor="middle" class="eq" fill="#334155">=</text>
  <g transform="translate(800 340)">
    <rect x="0" y="0" width="220" height="90" rx="12" fill="#0f172a"/>
    <text x="110" y="40" text-anchor="middle" font-family="Consolas,monospace" font-size="22" font-weight="800" fill="#ffffff">100 mL</text>
    <text x="110" y="70" text-anchor="middle" class="sub" fill="#94a3b8">of 1× solution</text>
  </g>

  <!-- serial dilution -->
  <g transform="translate(150 460)">
    <rect x="0" y="0" width="900" height="70" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="24" y="30" class="lab" fill="#5b21b6">Serial dilution</text>
    <text x="24" y="54" class="sub">Repeat a fixed fold-step → an exponential series: <tspan class="mono">1:10 → 1:100 → 1:1000 → …</tspan></text>
  </g>

  <rect x="150" y="546" width="900" height="52" rx="12" fill="#153056"/>
  <text x="600" y="578" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="16" font-weight="800" fill="#ffffff">Use the same unit on both sides — the equation is unit-agnostic (M, mg/mL, %, anything).</text>
</svg>
