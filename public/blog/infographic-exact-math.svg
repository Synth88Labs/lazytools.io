<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="Why calculators lie: floating point stores numbers in binary with about 15 to 17 significant digits, so 0.1 plus 0.2 gives 0.30000000000000004 and one third plus two thirds gives 0.9999999999999999. Exact arithmetic keeps fractions as fractions and integers at any size: one third plus two thirds equals exactly 1, roots appear as simplified radicals like (3 plus root 89) over 2, and 1000 factorial is computed digit-perfect at 2568 digits.">
  <defs>
    <style>
      .h { font: 800 30px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .lab { font: 700 19px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .sub { font: 500 15px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .big { font: 800 19px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; }
      .mono { font: 700 16px Consolas, Menlo, monospace; }
      .mono2 { font: 600 14px Consolas, Menlo, monospace; }
    </style>
  </defs>

  <text x="600" y="42" text-anchor="middle" class="h">➗ Your calculator is rounding — it just isn't telling you</text>

  <!-- float vs exact -->
  <g transform="translate(70 76)">
    <rect x="0" y="0" width="510" height="240" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="255" y="34" text-anchor="middle" class="big" fill="#991b1b">Floating point (every ordinary calculator)</text>
    <text x="30" y="72" class="mono2" fill="#7f1d1d">0.1 + 0.2</text>
    <text x="230" y="72" class="mono2" fill="#dc2626">= 0.30000000000000004</text>
    <text x="30" y="104" class="mono2" fill="#7f1d1d">1/3 + 2/3</text>
    <text x="230" y="104" class="mono2" fill="#dc2626">= 0.9999999999999999</text>
    <text x="30" y="136" class="mono2" fill="#7f1d1d">171!</text>
    <text x="230" y="136" class="mono2" fill="#dc2626">= Infinity (overflow)</text>
    <text x="30" y="168" class="mono2" fill="#7f1d1d">12345678901234567890</text>
    <text x="230" y="168" class="mono2" fill="#dc2626">→ …4567168 (digits lost)</text>
    <text x="255" y="212" text-anchor="middle" class="sub">binary storage, ~15–17 significant digits — close, silently</text>
  </g>
  <g transform="translate(620 76)">
    <rect x="0" y="0" width="510" height="240" rx="14" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
    <text x="255" y="34" text-anchor="middle" class="big" fill="#065f46">Exact arithmetic (these tools)</text>
    <text x="30" y="72" class="mono2" fill="#064e3b">1/10 + 2/10</text>
    <text x="230" y="72" class="mono2" fill="#059669">= 3/10, exactly</text>
    <text x="30" y="104" class="mono2" fill="#064e3b">1/3 + 2/3</text>
    <text x="230" y="104" class="mono2" fill="#059669">= 1, exactly</text>
    <text x="30" y="136" class="mono2" fill="#064e3b">1000!</text>
    <text x="230" y="136" class="mono2" fill="#059669">= all 2,568 digits</text>
    <text x="30" y="168" class="mono2" fill="#064e3b">x² − 3x − 20 = 0</text>
    <text x="230" y="168" class="mono2" fill="#059669">→ x = (3 ± √89)/2</text>
    <text x="255" y="212" text-anchor="middle" class="sub">true rationals + BigInt — fractions stay fractions</text>
  </g>

  <!-- how -->
  <text x="600" y="372" text-anchor="middle" class="lab">How exact arithmetic works</text>
  <g transform="translate(75 392)">
    <rect x="0" y="0" width="330" height="130" rx="14" fill="#eef9ff" stroke="#1d87f1" stroke-width="2"/>
    <text x="165" y="36" text-anchor="middle" class="big" fill="#1e3a8a">Rationals, not decimals</text>
    <text x="165" y="66" text-anchor="middle" class="sub">every number is a pair of integers</text>
    <text x="165" y="88" text-anchor="middle" class="mono" fill="#1e3a8a">2.5 → 5/2</text>
    <text x="165" y="112" text-anchor="middle" class="sub">so no value is ever approximated</text>
  </g>
  <g transform="translate(435 392)">
    <rect x="0" y="0" width="330" height="130" rx="14" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="165" y="36" text-anchor="middle" class="big" fill="#5b21b6">Integers of any size</text>
    <text x="165" y="66" text-anchor="middle" class="sub">BigInt grows as needed —</text>
    <text x="165" y="88" text-anchor="middle" class="mono" fill="#5b21b6">100-digit GCDs, 1000!</text>
    <text x="165" y="112" text-anchor="middle" class="sub">no 15-digit ceiling, no overflow</text>
  </g>
  <g transform="translate(795 392)">
    <rect x="0" y="0" width="330" height="130" rx="14" fill="#fefce8" stroke="#b45309" stroke-width="2"/>
    <text x="165" y="36" text-anchor="middle" class="big" fill="#854d0e">Radicals kept symbolic</text>
    <text x="165" y="66" text-anchor="middle" class="sub">roots simplify, not decimalize</text>
    <text x="165" y="88" text-anchor="middle" class="mono" fill="#854d0e">√72 → 6√2</text>
    <text x="165" y="112" text-anchor="middle" class="sub">the exact answer survives</text>
  </g>

  <rect x="200" y="556" width="800" height="52" rx="12" fill="#153056"/>
  <text x="600" y="578" text-anchor="middle" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="#ffffff">Exactness is checkable: the tools show their working, step by step —</text>
  <text x="600" y="598" text-anchor="middle" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#7ef0c0">Euclid's algorithm, common denominators, the quadratic formula — with your numbers.</text>
</svg>
