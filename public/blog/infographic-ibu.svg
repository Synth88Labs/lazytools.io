<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="BU to GU ratio: below 0.5 malt-forward, 0.5 to 0.8 balanced, above 0.8 hop-forward. Gravity units equal original gravity minus one times 1000.">
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="600" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="44" font-weight="800" fill="#0f172a">IBU alone doesn't predict bitterness</text>
  <text x="600" y="106" text-anchor="middle" font-family="system-ui, sans-serif" font-size="27" fill="#475569">Malt sweetness pushes back. Compare bitterness to gravity.</text>

  <!-- formula -->
  <rect x="150" y="140" width="900" height="112" rx="16" fill="#0f172a"/>
  <text x="600" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" font-weight="800" fill="#fbbf24">BU:GU = IBU ÷ gravity units</text>
  <text x="600" y="228" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" fill="#cbd5e1">GU = (OG − 1) × 1000 · so 1.055 → 55 GU</text>

  <!-- three bands -->
  <rect x="80" y="292" width="330" height="180" rx="16" fill="#fef3c7" stroke="#d97706" stroke-width="4"/>
  <text x="245" y="342" text-anchor="middle" font-family="system-ui, sans-serif" font-size="40" font-weight="800" fill="#92400e">&lt; 0.5</text>
  <text x="245" y="386" text-anchor="middle" font-family="system-ui, sans-serif" font-size="27" font-weight="700" fill="#b45309">MALT-FORWARD</text>
  <text x="245" y="426" text-anchor="middle" font-family="system-ui, sans-serif" font-size="23" fill="#78350f">sweeter, rounder</text>
  <text x="245" y="456" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" fill="#92400e">barleywine · bock</text>

  <rect x="435" y="292" width="330" height="180" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/>
  <text x="600" y="342" text-anchor="middle" font-family="system-ui, sans-serif" font-size="40" font-weight="800" fill="#166534">0.5 – 0.8</text>
  <text x="600" y="386" text-anchor="middle" font-family="system-ui, sans-serif" font-size="27" font-weight="700" fill="#15803d">BALANCED</text>
  <text x="600" y="426" text-anchor="middle" font-family="system-ui, sans-serif" font-size="23" fill="#14532d">malt meets hops</text>
  <text x="600" y="456" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" fill="#166534">pale ale · amber</text>

  <rect x="790" y="292" width="330" height="180" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
  <text x="955" y="342" text-anchor="middle" font-family="system-ui, sans-serif" font-size="40" font-weight="800" fill="#1e3a8a">&gt; 0.8</text>
  <text x="955" y="386" text-anchor="middle" font-family="system-ui, sans-serif" font-size="27" font-weight="700" fill="#1d4ed8">HOP-FORWARD</text>
  <text x="955" y="426" text-anchor="middle" font-family="system-ui, sans-serif" font-size="23" fill="#1e3a8a">crisp, bitter</text>
  <text x="955" y="456" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" fill="#1d4ed8">IPA · double IPA</text>

  <rect x="80" y="510" width="1040" height="148" rx="18" fill="#1e293b"/>
  <text x="600" y="556" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#f8fafc">60 IBU barleywine (100 GU) = 0.6 → balanced</text>
  <text x="600" y="598" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#f8fafc">30 IBU pilsner (45 GU) = 0.67 → tastes crisper</text>
  <text x="600" y="640" text-anchor="middle" font-family="system-ui, sans-serif" font-size="25" fill="#fbbf24">The bigger IBU is the less bitter-tasting beer.</text>
</svg>
