<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="IPv6 subnetting: the 128-bit address splits into a 48-bit global routing prefix, a 16-bit subnet ID and a 64-bit interface identifier. Common allocations: a /48 site holds 65,536 LANs, a /56 home delegation holds 256 LANs, and every LAN is one /64. The mindset shift from IPv4: stop counting hosts, start counting subnets.">
  <defs>
    <style>
      .h { font: 800 30px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .lab { font: 700 19px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .sub { font: 500 15px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .big { font: 800 20px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; }
      .mono { font: 600 15px Consolas, Menlo, monospace; }
    </style>
  </defs>

  <text x="600" y="42" text-anchor="middle" class="h">🌐 One IPv6 address = 128 bits, three jobs</text>

  <!-- 128-bit bar -->
  <g transform="translate(80 70)">
    <rect x="0" y="0" width="390" height="64" rx="10" fill="#1d87f1"/>
    <text x="195" y="28" text-anchor="middle" class="big" fill="#ffffff">Global routing prefix</text>
    <text x="195" y="50" text-anchor="middle" class="sub" fill="#dbeafe">48 bits — assigned by your ISP</text>
    <rect x="396" y="0" width="130" height="64" rx="10" fill="#7c3aed"/>
    <text x="461" y="28" text-anchor="middle" class="big" fill="#ffffff">Subnet ID</text>
    <text x="461" y="50" text-anchor="middle" class="sub" fill="#e9d5ff">16 bits — yours</text>
    <rect x="532" y="0" width="508" height="64" rx="10" fill="#059669"/>
    <text x="786" y="28" text-anchor="middle" class="big" fill="#ffffff">Interface identifier</text>
    <text x="786" y="50" text-anchor="middle" class="sub" fill="#d1fae5">64 bits — the device (SLAAC needs all 64)</text>
  </g>
  <g transform="translate(80 142)">
    <text x="0" y="14" class="mono" fill="#1d87f1">2001:0db8:00ab</text>
    <text x="400" y="14" class="mono" fill="#7c3aed">:0012</text>
    <text x="536" y="14" class="mono" fill="#059669">:0000:0000:0000:0001</text>
  </g>

  <!-- allocations -->
  <text x="600" y="212" text-anchor="middle" class="lab">What common allocations actually contain</text>
  <g transform="translate(60 232)">
    <rect x="0" y="0" width="345" height="130" rx="14" fill="#eef9ff" stroke="#1d87f1" stroke-width="2"/>
    <text x="172" y="36" text-anchor="middle" class="big" fill="#0f172a">/48 — a site</text>
    <text x="172" y="66" text-anchor="middle" class="sub">65,536 LANs</text>
    <text x="172" y="90" text-anchor="middle" class="sub">the standard business allocation</text>
  </g>
  <g transform="translate(427 232)">
    <rect x="0" y="0" width="345" height="130" rx="14" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="172" y="36" text-anchor="middle" class="big" fill="#0f172a">/56 — a home</text>
    <text x="172" y="66" text-anchor="middle" class="sub">256 LANs</text>
    <text x="172" y="90" text-anchor="middle" class="sub">typical ISP prefix delegation</text>
  </g>
  <g transform="translate(794 232)">
    <rect x="0" y="0" width="345" height="130" rx="14" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
    <text x="172" y="36" text-anchor="middle" class="big" fill="#0f172a">/64 — one LAN</text>
    <text x="172" y="66" text-anchor="middle" class="sub">18.4 quintillion addresses</text>
    <text x="172" y="90" text-anchor="middle" class="sub">always one per segment — never smaller</text>
  </g>

  <!-- mindset shift -->
  <text x="600" y="410" text-anchor="middle" class="lab">The mindset shift from IPv4</text>
  <g transform="translate(150 430)">
    <rect x="0" y="0" width="420" height="98" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="210" y="32" text-anchor="middle" class="big" fill="#991b1b">IPv4 habit</text>
    <text x="210" y="58" text-anchor="middle" class="sub">"How many hosts fit?"</text>
    <text x="210" y="80" text-anchor="middle" class="sub">squeeze masks, conserve every address</text>
  </g>
  <text x="600" y="485" text-anchor="middle" font-size="30" fill="#64748b">→</text>
  <g transform="translate(630 430)">
    <rect x="0" y="0" width="420" height="98" rx="14" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
    <text x="210" y="32" text-anchor="middle" class="big" fill="#065f46">IPv6 practice</text>
    <text x="210" y="58" text-anchor="middle" class="sub">"How many subnets do I need?"</text>
    <text x="210" y="80" text-anchor="middle" class="sub">one /64 per segment, subnet on nibbles</text>
  </g>

  <rect x="200" y="560" width="800" height="48" rx="12" fill="#153056"/>
  <text x="600" y="590" text-anchor="middle" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="#7ef0c0">IPv6 now carries the majority of Google user traffic — dual-stack is the present, not the future.</text>
</svg>
