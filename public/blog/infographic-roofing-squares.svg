<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="Estimating roofing. Step 1: the roof is bigger than its footprint because it slopes — multiply the footprint area by the slope factor, which is the square root of one plus rise over run squared. A 4 in 12 pitch has a slope factor of about 1.054. Step 2: convert to roofing squares, where one square equals 100 square feet, about 9.29 square metres. Step 3: shingles usually come 3 bundles to a square, so bundles equal squares times 3. Add 10 to 15 percent for ridges, valleys, starter and waste. Example: a 100 square metre footprint at 4 in 12 is about 105 square metres of roof.">
  <defs>
    <style>
      .h { font: 800 30px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .sub { font: 500 15px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .step { font: 800 16px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #4338ca; }
      .lab { font: 800 17px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .mono { font: 700 15px Consolas, Menlo, monospace; fill: #0f172a; }
      .big { font: 800 22px Consolas, Menlo, monospace; fill: #1d4ed8; }
    </style>
  </defs>

  <text x="600" y="42" text-anchor="middle" class="h">How many shingles? Three steps</text>
  <text x="600" y="70" text-anchor="middle" class="sub">a sloped roof covers more area than its footprint</text>

  <!-- step 1 -->
  <g transform="translate(70 100)">
    <rect x="0" y="0" width="340" height="230" rx="14" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/>
    <text x="20" y="34" class="step">1 · Footprint → roof area</text>
    <!-- little roof triangle -->
    <path d="M 40 150 L 170 80 L 300 150 Z" fill="none" stroke="#4338ca" stroke-width="2"/>
    <line x1="40" y1="150" x2="300" y2="150" stroke="#94a3b8" stroke-dasharray="4 3"/>
    <text x="170" y="175" text-anchor="middle" class="sub">footprint (run)</text>
    <text x="20" y="205" class="mono" font-size="13">× slope √(1 + (rise/run)²)</text>
    <text x="20" y="223" class="mono" font-size="12" fill="#64748b">4/12 pitch → ×1.054</text>
  </g>

  <!-- step 2 -->
  <g transform="translate(430 100)">
    <rect x="0" y="0" width="340" height="230" rx="14" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
    <text x="20" y="34" class="step" fill="#15803d">2 · Area → squares</text>
    <text x="20" y="90" class="big" fill="#15803d">1 square = 100 sq ft</text>
    <text x="20" y="120" class="mono" font-size="13">≈ 9.29 m²</text>
    <text x="20" y="164" class="mono">squares = area ÷ 100 sq ft</text>
    <text x="20" y="200" class="sub" style="font-size:13px">roofing is quoted per square</text>
  </g>

  <!-- step 3 -->
  <g transform="translate(790 100)">
    <rect x="0" y="0" width="340" height="230" rx="14" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
    <text x="20" y="34" class="step" fill="#b45309">3 · Squares → bundles</text>
    <text x="20" y="90" class="big" fill="#b45309">bundles = squares × 3</text>
    <text x="20" y="120" class="mono" font-size="13">(3 bundles per square)</text>
    <text x="20" y="164" class="mono">+ 10–15% ridges,</text>
    <text x="20" y="186" class="mono">valleys, starter, waste</text>
  </g>

  <!-- footer -->
  <g transform="translate(70 356)">
    <rect x="0" y="0" width="1060" height="56" rx="14" fill="#0c2f6b"/>
    <text x="24" y="35" font-family="Consolas, Menlo, monospace" font-size="15" fill="#7ef0c0">lazytools.io — roofing, drywall, deck &amp; fence calculators (metric or imperial), in your browser</text>
  </g>
</svg>
