<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="How much chocolate is toxic to dogs. Theobromine content per gram rises from white chocolate about 0.01 milligrams, milk chocolate 2.1, dark chocolate 5.4, baking chocolate 14, to cocoa powder 26 milligrams per gram. Toxic dose bands per kilogram of the dog's body weight: below 20 milligrams per kilogram usually mild, 20 to 40 vomiting and restlessness, 40 to 60 racing heart and tremors, 60 to 100 seizures, above 100 potentially fatal.">
  <defs>
    <style>
      .h { font: 800 28px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#0f172a; }
      .sub { font: 500 15px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#64748b; }
      .lab { font: 700 15px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#334155; }
      .val { font: 700 14px Consolas,Menlo,monospace; fill:#78350f; }
      .panel { font: 800 17px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#0f172a; }
      .zone { font: 800 14px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#fff; }
      .zt { font: 600 13px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#fff; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="640" fill="#fffbf5" />
  <text x="600" y="44" text-anchor="middle" class="h">How much chocolate is toxic to a dog?</text>
  <text x="600" y="70" text-anchor="middle" class="sub">It depends on the type of chocolate and the dog's body weight</text>

  <!-- Left panel: theobromine content bars -->
  <text x="70" y="120" class="panel">Theobromine per gram (darker = deadlier)</text>

  <!-- bars: scale 26 mg -> 470px -->
  <!-- white -->
  <text x="70" y="163" class="lab">White</text>
  <rect x="230" y="150" width="2" height="20" rx="3" fill="#d6c3a5" />
  <text x="245" y="165" class="val">0.01 mg/g</text>
  <!-- milk -->
  <text x="70" y="203" class="lab">Milk</text>
  <rect x="230" y="190" width="38" height="20" rx="3" fill="#b07a4a" />
  <text x="280" y="205" class="val">2.1 mg/g</text>
  <!-- dark -->
  <text x="70" y="243" class="lab">Dark</text>
  <rect x="230" y="230" width="98" height="20" rx="3" fill="#7c4a24" />
  <text x="340" y="245" class="val">5.4 mg/g</text>
  <!-- baking -->
  <text x="70" y="283" class="lab">Baking</text>
  <rect x="230" y="270" width="253" height="20" rx="3" fill="#4a2a12" />
  <text x="495" y="285" class="val">14 mg/g</text>
  <!-- cocoa -->
  <text x="70" y="323" class="lab">Cocoa powder</text>
  <rect x="230" y="310" width="470" height="20" rx="3" fill="#2e1a0b" />
  <text x="712" y="325" class="val">26 mg/g</text>

  <text x="70" y="372" class="sub">Baking chocolate carries roughly 7x the theobromine of milk chocolate.</text>

  <!-- Right/bottom panel: dose risk bands -->
  <text x="70" y="430" class="panel">Risk by dose — milligrams of theobromine per kg of dog</text>

  <!-- band bar -->
  <g>
    <rect x="70"  y="450" width="200" height="52" fill="#16a34a" />
    <rect x="270" y="450" width="200" height="52" fill="#eab308" />
    <rect x="470" y="450" width="200" height="52" fill="#f97316" />
    <rect x="670" y="450" width="200" height="52" fill="#e11d48" />
    <rect x="870" y="450" width="260" height="52" fill="#7f1d1d" />

    <text x="170" y="475" text-anchor="middle" class="zone">Under 20</text>
    <text x="170" y="493" text-anchor="middle" class="zt">usually mild</text>
    <text x="370" y="475" text-anchor="middle" class="zone">20 to 40</text>
    <text x="370" y="493" text-anchor="middle" class="zt">vomiting</text>
    <text x="570" y="475" text-anchor="middle" class="zone">40 to 60</text>
    <text x="570" y="493" text-anchor="middle" class="zt">racing heart</text>
    <text x="770" y="475" text-anchor="middle" class="zone">60 to 100</text>
    <text x="770" y="493" text-anchor="middle" class="zt">seizures</text>
    <text x="1000" y="475" text-anchor="middle" class="zone">Over 100</text>
    <text x="1000" y="493" text-anchor="middle" class="zt">potentially fatal</text>
  </g>

  <text x="70" y="545" class="lab">Dose = (theobromine mg/g x grams eaten) divided by the dog's weight in kg</text>

  <rect x="70" y="565" width="1060" height="48" rx="8" fill="#fee2e2" stroke="#fca5a5" />
  <text x="90" y="587" class="lab">If your dog ate any chocolate, call your vet or a pet poison line now — do not wait for symptoms.</text>
  <text x="90" y="605" class="sub">US ASPCA Animal Poison Control 888-426-4435  ·  UK Animal PoisonLine 01202 509000  ·  Estimate only, not a diagnosis.</text>
</svg>
