<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="The Pomodoro cycle: four rounds of 25 minutes of focus each followed by a 5-minute break, then a longer 15 to 30 minute break. Why it works: a small commitment defeats procrastination, the hard boundary fights perfectionism, breaks prevent burnout, and the day becomes countable units of progress.">
  <defs>
    <style>
      .h { font: 800 30px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .lab { font: 700 19px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .sub { font: 500 15px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .big { font: 800 22px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; }
      .item { font: 600 16px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <text x="600" y="44" text-anchor="middle" class="h">🍅 One pomodoro = 25 min focus + a real break</text>

  <!-- cycle row: 4 focus+break, then long break -->
  <g transform="translate(60 86)">
    <!-- 4 rounds -->
    <g>
      <rect x="0" y="0" width="150" height="70" rx="12" fill="#1d87f1"/><text x="75" y="34" text-anchor="middle" class="big" fill="#ffffff">25 min</text><text x="75" y="56" text-anchor="middle" class="sub" fill="#dbeafe">focus</text>
      <rect x="158" y="14" width="56" height="42" rx="10" fill="#10b981"/><text x="186" y="40" text-anchor="middle" class="sub" fill="#ffffff" font-weight="700">5m</text>
    </g>
    <g transform="translate(222 0)">
      <rect x="0" y="0" width="150" height="70" rx="12" fill="#1d87f1"/><text x="75" y="34" text-anchor="middle" class="big" fill="#ffffff">25 min</text><text x="75" y="56" text-anchor="middle" class="sub" fill="#dbeafe">focus</text>
      <rect x="158" y="14" width="56" height="42" rx="10" fill="#10b981"/><text x="186" y="40" text-anchor="middle" class="sub" fill="#ffffff" font-weight="700">5m</text>
    </g>
    <g transform="translate(444 0)">
      <rect x="0" y="0" width="150" height="70" rx="12" fill="#1d87f1"/><text x="75" y="34" text-anchor="middle" class="big" fill="#ffffff">25 min</text><text x="75" y="56" text-anchor="middle" class="sub" fill="#dbeafe">focus</text>
      <rect x="158" y="14" width="56" height="42" rx="10" fill="#10b981"/><text x="186" y="40" text-anchor="middle" class="sub" fill="#ffffff" font-weight="700">5m</text>
    </g>
    <g transform="translate(666 0)">
      <rect x="0" y="0" width="150" height="70" rx="12" fill="#1d87f1"/><text x="75" y="34" text-anchor="middle" class="big" fill="#ffffff">25 min</text><text x="75" y="56" text-anchor="middle" class="sub" fill="#dbeafe">focus</text>
    </g>
    <g transform="translate(830 0)">
      <rect x="0" y="0" width="250" height="70" rx="12" fill="#7c3aed"/><text x="125" y="34" text-anchor="middle" class="big" fill="#ffffff">15–30 min</text><text x="125" y="56" text-anchor="middle" class="sub" fill="#e9d5ff">long break</text>
    </g>
  </g>
  <text x="600" y="196" text-anchor="middle" class="sub">Four focus sprints, then a longer rest — repeat through the day.</text>

  <!-- why it works -->
  <text x="600" y="248" text-anchor="middle" class="lab">Why a kitchen timer beats willpower</text>
  <g transform="translate(60 268)">
    <rect x="0" y="0" width="255" height="150" rx="14" fill="#eef9ff" stroke="#1d87f1" stroke-width="2"/>
    <text x="127" y="40" text-anchor="middle" font-size="30">🚀</text>
    <text x="127" y="76" text-anchor="middle" class="item" font-weight="700">Starting is easy</text>
    <text x="127" y="104" text-anchor="middle" class="sub">"focus for 25 min" isn't</text>
    <text x="127" y="124" text-anchor="middle" class="sub">daunting — defeats delay</text>
  </g>
  <g transform="translate(330 268)">
    <rect x="0" y="0" width="255" height="150" rx="14" fill="#fefce8" stroke="#b45309" stroke-width="2"/>
    <text x="127" y="40" text-anchor="middle" font-size="30">📦</text>
    <text x="127" y="76" text-anchor="middle" class="item" font-weight="700">The box limits worry</text>
    <text x="127" y="104" text-anchor="middle" class="sub">a hard boundary fights</text>
    <text x="127" y="124" text-anchor="middle" class="sub">perfectionism &amp; dread</text>
  </g>
  <g transform="translate(600 268)">
    <rect x="0" y="0" width="255" height="150" rx="14" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
    <text x="127" y="40" text-anchor="middle" font-size="30">🔋</text>
    <text x="127" y="76" text-anchor="middle" class="item" font-weight="700">Breaks prevent burnout</text>
    <text x="127" y="104" text-anchor="middle" class="sub">regular rest keeps</text>
    <text x="127" y="124" text-anchor="middle" class="sub">quality up all day</text>
  </g>
  <g transform="translate(870 268)">
    <rect x="0" y="0" width="255" height="150" rx="14" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="127" y="40" text-anchor="middle" font-size="30">📊</text>
    <text x="127" y="76" text-anchor="middle" class="item" font-weight="700">Progress becomes real</text>
    <text x="127" y="104" text-anchor="middle" class="sub">count your sprints —</text>
    <text x="127" y="124" text-anchor="middle" class="sub">evidence, not "I was busy"</text>
  </g>

  <rect x="200" y="452" width="800" height="52" rx="12" fill="#153056"/>
  <text x="600" y="478" text-anchor="middle" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="#ffffff">The one rule people break: the break is for resting your attention —</text>
  <text x="600" y="498" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="15" font-weight="600" fill="#7ef0c0">not for checking email or a feed</text>

  <text x="600" y="548" text-anchor="middle" class="sub">Tune the intervals to you: 25/5 classic · 50/10 for deep flow · 15/5 when energy is low.</text>
</svg>
