<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="Why early mortgage payments are almost all interest. Every month you pay interest on the balance that is still owed, and that balance starts near the full loan. On a 300,000 dollar loan at 6 percent over 30 years the fixed payment is about 1,799 dollars. In payment number 1 the interest is 1,500 dollars, which is 300,000 times 0.5 percent monthly, leaving only 299 dollars going to principal — 83 percent interest. By the halfway point payment 180 the split is roughly even. Near the end payment 360 almost the entire payment is principal. Because the balance barely drops at first, total interest over the loan is about 347,500 dollars, more than the amount borrowed. Paying extra principal early is what shortens the loan.">
  <defs>
    <style>
      .h { font: 800 30px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#0f172a; }
      .lab { font: 700 18px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#334155; }
      .sub { font: 500 14px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#64748b; }
      .big { font: 800 19px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; }
      .mono { font: 700 16px Consolas,Menlo,monospace; }
      .tiny { font: 600 13px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; }
    </style>
  </defs>

  <text x="600" y="40" text-anchor="middle" class="h">🏠 Why your first mortgage payment is 83% interest</text>
  <text x="600" y="70" text-anchor="middle" class="sub">$300,000 loan · 6% APR · 30 years · fixed payment ≈ $1,799/month · interest = balance × 0.5% each month</text>

  <!-- three payment columns: interest (red) stacked on principal (green), fixed total height -->
  <!-- payment 1: interest 1500/1799 = 83.4% ; principal 16.6% -->
  <g transform="translate(150 110)">
    <text x="110" y="18" text-anchor="middle" class="lab">Payment #1</text>
    <rect x="35" y="30" width="150" height="250" rx="8" fill="#f1f5f9"/>
    <rect x="35" y="30" width="150" height="209" rx="8" fill="#fecaca"/>
    <rect x="35" y="239" width="150" height="41" fill="#bbf7d0"/>
    <text x="110" y="140" text-anchor="middle" class="mono" fill="#991b1b">$1,500</text>
    <text x="110" y="160" text-anchor="middle" class="tiny" fill="#991b1b">interest</text>
    <text x="110" y="264" text-anchor="middle" class="tiny" fill="#065f46">$299 principal</text>
    <text x="110" y="308" text-anchor="middle" class="sub">balance still ≈ $300k</text>
  </g>

  <!-- payment 180: ~even -->
  <g transform="translate(490 110)">
    <text x="110" y="18" text-anchor="middle" class="lab">Payment #180 (halfway)</text>
    <rect x="35" y="30" width="150" height="250" rx="8" fill="#f1f5f9"/>
    <rect x="35" y="30" width="150" height="120" rx="8" fill="#fecaca"/>
    <rect x="35" y="150" width="150" height="130" fill="#bbf7d0"/>
    <text x="110" y="98" text-anchor="middle" class="mono" fill="#991b1b">≈ $860</text>
    <text x="110" y="220" text-anchor="middle" class="mono" fill="#065f46">≈ $939</text>
    <text x="110" y="308" text-anchor="middle" class="sub">roughly a 50/50 split</text>
  </g>

  <!-- payment 360: almost all principal -->
  <g transform="translate(830 110)">
    <text x="110" y="18" text-anchor="middle" class="lab">Payment #360 (last)</text>
    <rect x="35" y="30" width="150" height="250" rx="8" fill="#f1f5f9"/>
    <rect x="35" y="30" width="150" height="22" rx="8" fill="#fecaca"/>
    <rect x="35" y="52" width="150" height="228" rx="8" fill="#bbf7d0"/>
    <text x="110" y="170" text-anchor="middle" class="mono" fill="#065f46">$1,790</text>
    <text x="110" y="190" text-anchor="middle" class="tiny" fill="#065f46">principal</text>
    <text x="110" y="46" text-anchor="middle" class="tiny" fill="#991b1b">$9 int.</text>
    <text x="110" y="308" text-anchor="middle" class="sub">balance ≈ $0</text>
  </g>

  <!-- legend -->
  <g transform="translate(430 432)">
    <rect x="0" y="0" width="18" height="18" rx="4" fill="#fecaca"/><text x="26" y="14" class="tiny" fill="#334155">Interest (to the lender)</text>
    <rect x="220" y="0" width="18" height="18" rx="4" fill="#bbf7d0"/><text x="246" y="14" class="tiny" fill="#334155">Principal (builds your equity)</text>
  </g>

  <rect x="130" y="474" width="940" height="120" rx="14" fill="#153056"/>
  <text x="600" y="510" text-anchor="middle" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-size="17" font-weight="800" fill="#ffffff">The payment is fixed; only the split moves. Interest is charged on what you still owe —</text>
  <text x="600" y="536" text-anchor="middle" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-size="17" font-weight="800" fill="#ffffff">and early on you still owe almost everything.</text>
  <text x="600" y="568" text-anchor="middle" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#7ef0c0">Total interest ≈ $347,500 — more than you borrowed. Extra principal early is what shortens the loan.</text>
</svg>
