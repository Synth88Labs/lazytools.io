<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="How to find the pH of a weak acid with an ICE table. A weak acid HA ionizes partially: HA in equilibrium with H plus and A minus. The ICE table: Initial concentration C, 0, 0; Change minus x, plus x, plus x; Equilibrium C minus x, x, x. The equilibrium expression Ka equals x squared divided by (C minus x). Worked example: 0.1 molar acetic acid with Ka 1.8 times ten to the minus five gives x equals 1.33 times ten to the minus three molar, so pH equals minus log x equals 2.87 — not 1, which is what a strong acid would give.">
  <defs>
    <style>
      .h { font: 800 27px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .sub { font: 500 15px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .lab { font: 700 14px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .cell { font: 700 16px Consolas, Menlo, monospace; fill: #0f172a; }
      .hdr { font: 800 14px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #1d4ed8; }
      .ex { font: 800 16px Consolas, Menlo, monospace; fill: #0f172a; }
    </style>
  </defs>

  <text x="600" y="40" text-anchor="middle" class="h">Finding the pH of a weak acid: the ICE table</text>
  <text x="600" y="66" text-anchor="middle" class="sub">a weak acid only partly ionizes — so pH isn't just −log of the concentration</text>

  <text x="600" y="104" text-anchor="middle" class="ex" fill="#1d4ed8">HA  ⇌  H⁺  +  A⁻</text>

  <!-- ICE table -->
  <g transform="translate(150 130)">
    <!-- header row -->
    <rect x="0" y="0" width="180" height="38" fill="#eff6ff" stroke="#cbd5e1"/>
    <rect x="180" y="0" width="240" height="38" fill="#eff6ff" stroke="#cbd5e1"/>
    <rect x="420" y="0" width="240" height="38" fill="#eff6ff" stroke="#cbd5e1"/>
    <rect x="660" y="0" width="240" height="38" fill="#eff6ff" stroke="#cbd5e1"/>
    <text x="90" y="25" text-anchor="middle" class="hdr"> </text>
    <text x="300" y="25" text-anchor="middle" class="hdr">HA</text>
    <text x="540" y="25" text-anchor="middle" class="hdr">H⁺</text>
    <text x="780" y="25" text-anchor="middle" class="hdr">A⁻</text>
    <!-- rows -->
    <g>
      <rect x="0" y="38" width="180" height="40" fill="#f8fafc" stroke="#cbd5e1"/><text x="16" y="64" class="lab">Initial</text>
      <rect x="180" y="38" width="240" height="40" fill="#ffffff" stroke="#cbd5e1"/><text x="300" y="64" text-anchor="middle" class="cell">C</text>
      <rect x="420" y="38" width="240" height="40" fill="#ffffff" stroke="#cbd5e1"/><text x="540" y="64" text-anchor="middle" class="cell">0</text>
      <rect x="660" y="38" width="240" height="40" fill="#ffffff" stroke="#cbd5e1"/><text x="780" y="64" text-anchor="middle" class="cell">0</text>

      <rect x="0" y="78" width="180" height="40" fill="#f8fafc" stroke="#cbd5e1"/><text x="16" y="104" class="lab">Change</text>
      <rect x="180" y="78" width="240" height="40" fill="#fff7ed" stroke="#cbd5e1"/><text x="300" y="104" text-anchor="middle" class="cell" fill="#b45309">− x</text>
      <rect x="420" y="78" width="240" height="40" fill="#ecfdf5" stroke="#cbd5e1"/><text x="540" y="104" text-anchor="middle" class="cell" fill="#047857">+ x</text>
      <rect x="660" y="78" width="240" height="40" fill="#ecfdf5" stroke="#cbd5e1"/><text x="780" y="104" text-anchor="middle" class="cell" fill="#047857">+ x</text>

      <rect x="0" y="118" width="180" height="40" fill="#f8fafc" stroke="#cbd5e1"/><text x="16" y="144" class="lab">Equilibrium</text>
      <rect x="180" y="118" width="240" height="40" fill="#ffffff" stroke="#1d4ed8"/><text x="300" y="144" text-anchor="middle" class="cell">C − x</text>
      <rect x="420" y="118" width="240" height="40" fill="#ffffff" stroke="#1d4ed8"/><text x="540" y="144" text-anchor="middle" class="cell">x</text>
      <rect x="660" y="118" width="240" height="40" fill="#ffffff" stroke="#1d4ed8"/><text x="780" y="144" text-anchor="middle" class="cell">x</text>
    </g>
  </g>

  <!-- equation band -->
  <g transform="translate(150 320)">
    <rect x="0" y="0" width="900" height="56" rx="14" fill="#0f172a"/>
    <text x="450" y="36" text-anchor="middle" class="ex" fill="#7ef0c0">Ka  =  x² / ( C − x )      →      solve for  x = [H⁺]</text>
  </g>

  <!-- worked example -->
  <g transform="translate(150 410)">
    <text x="0" y="0" class="lab" fill="#1d4ed8">WORKED EXAMPLE — 0.1 M acetic acid, Ka = 1.8 × 10⁻⁵</text>
    <text x="0" y="32" class="ex">x = [H⁺] = 1.33 × 10⁻³ M    →    pH = −log x = 2.87</text>
    <text x="0" y="62" class="sub">A strong acid at 0.1 M would give pH 1 — the weak acid is far less acidic because it barely ionizes (~1.3%).</text>
  </g>

  <!-- footer -->
  <g transform="translate(150 500)">
    <rect x="0" y="0" width="900" height="50" rx="14" fill="#0c2f6b"/>
    <text x="24" y="31" font-family="Consolas, Menlo, monospace" font-size="14" fill="#7ef0c0">lazytools.io — weak acid/base pH, Ksp &amp; equilibrium (ICE) calculators, free &amp; private</text>
  </g>

  <text x="600" y="582" text-anchor="middle" class="sub">The tool solves the full quadratic — no "assume x is small" — so it's accurate even for stronger weak acids and dilute solutions.</text>
</svg>
