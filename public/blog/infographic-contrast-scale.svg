<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-label="WCAG contrast scale from 1:1 to 21:1 with the AA and AAA thresholds marked, and a passing 8.6:1 sample next to a failing 2.3:1 sample">
  <defs>
    <style>
      .h { font: 800 30px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .lab { font: 700 20px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .sub { font: 500 17px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .mark { font: 800 19px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; }
      .sample-big { font: 800 26px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; }
      .sample-small { font: 500 16px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; }
    </style>
    <linearGradient id="scale" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fca5a5"/>
      <stop offset="0.35" stop-color="#fcd34d"/>
      <stop offset="0.65" stop-color="#86efac"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <text x="600" y="46" text-anchor="middle" class="h">The WCAG contrast scale — and where the law draws lines</text>

  <!-- scale bar: ratio 1..21 mapped x = 100 + (r-1)*50 -->
  <rect x="100" y="110" width="1000" height="40" rx="10" fill="url(#scale)"/>
  <text x="100" y="180" text-anchor="middle" class="sub">1:1</text>
  <text x="1100" y="180" text-anchor="middle" class="sub">21:1</text>
  <text x="100" y="205" text-anchor="middle" class="sub">identical colors</text>
  <text x="1100" y="205" text-anchor="middle" class="sub">black on white</text>

  <!-- markers: 3:1 x=200, 4.5:1 x=275, 7:1 x=400 -->
  <line x1="200" y1="95" x2="200" y2="165" stroke="#b45309" stroke-width="4"/>
  <text x="200" y="86" text-anchor="middle" class="mark" fill="#b45309">3:1</text>
  <text x="200" y="235" text-anchor="middle" class="sub">AA large text + UI</text>

  <line x1="275" y1="95" x2="275" y2="165" stroke="#dc2626" stroke-width="4"/>
  <text x="285" y="86" text-anchor="middle" class="mark" fill="#dc2626">4.5:1</text>
  <text x="290" y="258" text-anchor="middle" class="sub">AA normal text — the legal reference line</text>

  <line x1="400" y1="95" x2="400" y2="165" stroke="#059669" stroke-width="4"/>
  <text x="400" y="86" text-anchor="middle" class="mark" fill="#059669">7:1</text>
  <text x="400" y="235" text-anchor="middle" class="sub">AAA normal text</text>

  <!-- samples -->
  <g transform="translate(140 320)">
    <rect x="0" y="0" width="420" height="170" rx="16" fill="#eef9ff" stroke="#94a3b8" stroke-width="2"/>
    <text x="30" y="55" class="sample-big" fill="#1a4d8d">Readable heading</text>
    <text x="30" y="90" class="sample-small" fill="#1a4d8d">Body text you can actually read on a phone in sunlight.</text>
    <rect x="30" y="115" width="150" height="36" rx="18" fill="#059669"/>
    <text x="105" y="139" text-anchor="middle" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-size="18" font-weight="800" fill="#ffffff">✓ 8.6:1 — AAA</text>
  </g>

  <g transform="translate(640 320)">
    <rect x="0" y="0" width="420" height="170" rx="16" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
    <text x="30" y="55" class="sample-big" fill="#a3aebf">Faint heading</text>
    <text x="30" y="90" class="sample-small" fill="#a3aebf">Body text that vanishes the moment the sun comes out.</text>
    <rect x="30" y="115" width="150" height="36" rx="18" fill="#dc2626"/>
    <text x="105" y="139" text-anchor="middle" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-size="18" font-weight="800" fill="#ffffff">✗ 1.7:1 — fail</text>
  </g>

  <rect x="180" y="540" width="840" height="52" rx="12" fill="#153056"/>
  <text x="600" y="574" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="21" font-weight="600" fill="#7ef0c0">ratio = (L₁ + 0.05) ÷ (L₂ + 0.05) — WCAG 2.x relative luminance</text>
</svg>
