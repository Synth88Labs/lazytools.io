<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="Two workflows compared: an upload-based PDF unlocker receives both the confidential document and its password at an unknown server, versus browser-based processing where qpdf compiled to WebAssembly decrypts the file in local memory with nothing transmitted. A second panel explains that the user or open password opens the document while the owner or permissions password controls printing and copying.">
  <defs>
    <style>
      .h { font: 800 30px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .lab { font: 700 19px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .sub { font: 500 15px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .card-t { font: 800 20px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; }
      .item { font: 600 16px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .key { font: 800 18px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>

  <text x="600" y="44" text-anchor="middle" class="h">Unlocking a PDF: never send the file and its key together</text>

  <!-- upload path -->
  <g transform="translate(75 80)">
    <rect x="0" y="0" width="500" height="205" rx="16" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="250" y="38" text-anchor="middle" class="card-t" fill="#991b1b">Upload-based unlocker</text>
    <text x="40" y="78" class="item">📄 confidential PDF → unknown server</text>
    <text x="40" y="112" class="item">🔑 …AND its password, together</text>
    <text x="40" y="146" class="item">🌐 the lock and the key, both handed over</text>
    <rect x="38" y="164" width="424" height="28" rx="14" fill="#dc2626"/>
    <text x="250" y="184" text-anchor="middle" class="key" fill="#ffffff" font-size="15">the two things that should never travel as a pair</text>
  </g>

  <!-- local path -->
  <g transform="translate(625 80)">
    <rect x="0" y="0" width="500" height="205" rx="16" fill="#f0fdf4" stroke="#059669" stroke-width="3"/>
    <text x="250" y="38" text-anchor="middle" class="card-t" fill="#065f46">Browser-based (qpdf + WebAssembly)</text>
    <text x="40" y="78" class="item">📄 PDF stays in your browser's memory</text>
    <text x="40" y="112" class="item">🔑 password never leaves the page</text>
    <text x="40" y="146" class="item">⬇ decrypted copy downloads locally</text>
    <rect x="38" y="164" width="424" height="28" rx="14" fill="#059669"/>
    <text x="250" y="184" text-anchor="middle" class="key" fill="#ffffff" font-size="15">works offline — the proof nothing is sent</text>
  </g>

  <!-- two passwords -->
  <text x="600" y="335" text-anchor="middle" class="lab">Two passwords, two jobs</text>
  <g transform="translate(150 360)">
    <rect x="0" y="0" width="430" height="150" rx="16" fill="#eef9ff" stroke="#1d87f1" stroke-width="2"/>
    <text x="215" y="42" text-anchor="middle" class="card-t" fill="#153056">User / open password</text>
    <text x="215" y="80" text-anchor="middle" class="item">required to open the document at all</text>
    <text x="215" y="112" text-anchor="middle" class="sub">no password → no view. This is the real protection.</text>
  </g>
  <g transform="translate(620 360)">
    <rect x="0" y="0" width="430" height="150" rx="16" fill="#fefce8" stroke="#b45309" stroke-width="2"/>
    <text x="215" y="42" text-anchor="middle" class="card-t" fill="#92400e">Owner / permissions password</text>
    <text x="215" y="80" text-anchor="middle" class="item">controls printing, copying, editing</text>
    <text x="215" y="112" text-anchor="middle" class="sub">"opens but won't print" = this, with an empty open password</text>
  </g>

  <rect x="230" y="560" width="740" height="48" rx="12" fill="#153056"/>
  <text x="600" y="591" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="18" font-weight="600" fill="#7ef0c0">AES-256 is unbreakable; a weak password is not — generate a long one</text>
</svg>
