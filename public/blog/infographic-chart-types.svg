<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Six chart types and the question each one answers.">
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="600" y="66" text-anchor="middle" font-family="system-ui, sans-serif" font-size="44" font-weight="800" fill="#0f172a">Start from the question.</text>
  <text x="600" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" fill="#475569">The chart type follows from it.</text>

  <!-- Row 1 -->
  <g>
    <rect x="60" y="160" width="345" height="150" rx="16" fill="#ffffff" stroke="#dbeafe" stroke-width="3"/>
    <rect x="92" y="248" width="26" height="42" fill="#2563eb"/>
    <rect x="126" y="222" width="26" height="68" fill="#2563eb"/>
    <rect x="160" y="264" width="26" height="26" fill="#2563eb"/>
    <text x="210" y="212" font-family="system-ui, sans-serif" font-size="27" font-weight="800" fill="#1e3a8a">BAR</text>
    <text x="210" y="250" font-family="system-ui, sans-serif" font-size="23" fill="#334155">Which is</text>
    <text x="210" y="280" font-family="system-ui, sans-serif" font-size="23" fill="#334155">biggest?</text>
  </g>
  <g>
    <rect x="427" y="160" width="345" height="150" rx="16" fill="#ffffff" stroke="#dcfce7" stroke-width="3"/>
    <polyline points="459,282 489,250 519,262 549,216" fill="none" stroke="#16a34a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="577" y="212" font-family="system-ui, sans-serif" font-size="27" font-weight="800" fill="#166534">LINE</text>
    <text x="577" y="250" font-family="system-ui, sans-serif" font-size="23" fill="#334155">How did it</text>
    <text x="577" y="280" font-family="system-ui, sans-serif" font-size="23" fill="#334155">change?</text>
  </g>
  <g>
    <rect x="794" y="160" width="346" height="150" rx="16" fill="#ffffff" stroke="#fef3c7" stroke-width="3"/>
    <circle cx="856" cy="252" r="38" fill="#f59e0b"/>
    <path d="M 856 252 L 856 214 A 38 38 0 0 1 890 269 Z" fill="#dc2626"/>
    <text x="920" y="212" font-family="system-ui, sans-serif" font-size="27" font-weight="800" fill="#92400e">PIE</text>
    <text x="920" y="250" font-family="system-ui, sans-serif" font-size="23" fill="#334155">What share of</text>
    <text x="920" y="280" font-family="system-ui, sans-serif" font-size="23" fill="#334155">the total?</text>
  </g>

  <!-- Row 2 -->
  <g>
    <rect x="60" y="340" width="345" height="150" rx="16" fill="#ffffff" stroke="#ede9fe" stroke-width="3"/>
    <path d="M 88 386 L 186 386 L 168 412 L 106 412 Z" fill="#7c3aed"/>
    <path d="M 106 418 L 168 418 L 152 446 L 122 446 Z" fill="#a78bfa"/>
    <text x="210" y="392" font-family="system-ui, sans-serif" font-size="27" font-weight="800" fill="#5b21b6">FUNNEL</text>
    <text x="210" y="430" font-family="system-ui, sans-serif" font-size="23" fill="#334155">Where do they</text>
    <text x="210" y="460" font-family="system-ui, sans-serif" font-size="23" fill="#334155">drop off?</text>
  </g>
  <g>
    <rect x="427" y="340" width="345" height="150" rx="16" fill="#ffffff" stroke="#cffafe" stroke-width="3"/>
    <polygon points="489,376 527,398 513,440 465,440 451,398" fill="none" stroke="#0891b2" stroke-width="3"/>
    <polygon points="489,392 517,404 507,432 473,428 465,402" fill="#0891b2" fill-opacity="0.35" stroke="#0891b2" stroke-width="3"/>
    <text x="577" y="392" font-family="system-ui, sans-serif" font-size="27" font-weight="800" fill="#155e75">RADAR</text>
    <text x="577" y="430" font-family="system-ui, sans-serif" font-size="23" fill="#334155">What's the</text>
    <text x="577" y="460" font-family="system-ui, sans-serif" font-size="23" fill="#334155">overall profile?</text>
  </g>
  <g>
    <rect x="794" y="340" width="346" height="150" rx="16" fill="#ffffff" stroke="#fee2e2" stroke-width="3"/>
    <rect x="824" y="420" width="22" height="30" fill="#475569"/>
    <rect x="854" y="400" width="22" height="22" fill="#16a34a"/>
    <rect x="884" y="422" width="22" height="24" fill="#dc2626"/>
    <text x="920" y="392" font-family="system-ui, sans-serif" font-size="27" font-weight="800" fill="#991b1b">WATERFALL</text>
    <text x="920" y="430" font-family="system-ui, sans-serif" font-size="23" fill="#334155">What moved</text>
    <text x="920" y="460" font-family="system-ui, sans-serif" font-size="23" fill="#334155">the number?</text>
  </g>

  <rect x="60" y="530" width="1080" height="118" rx="18" fill="#0f172a"/>
  <text x="600" y="578" text-anchor="middle" font-family="system-ui, sans-serif" font-size="32" font-weight="800" fill="#f8fafc">Unsure? Use a bar chart.</text>
  <text x="600" y="618" text-anchor="middle" font-family="system-ui, sans-serif" font-size="25" fill="#cbd5e1">Length is the easiest quantity for people to compare accurately.</text>
</svg>
