<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-label="One identifier written five ways — userLoginCount in camelCase for JavaScript, user_login_count in snake_case for Python, user-login-count in kebab-case for URLs and CSS, UserLoginCount in PascalCase for classes, USER_LOGIN_COUNT for constants">
  <defs>
    <style>
      .h { font: 800 30px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .code { font: 700 26px Consolas, Menlo, monospace; }
      .use { font: 600 18px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .tag { font: 800 15px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #ffffff; letter-spacing: 2px; }
    </style>
  </defs>

  <text x="600" y="46" text-anchor="middle" class="h">One identifier, five outfits</text>

  <!-- source phrase -->
  <rect x="400" y="76" width="400" height="52" rx="14" fill="#153056"/>
  <text x="600" y="110" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="24" font-weight="700" fill="#7ef0c0">"user login count"</text>

  <!-- five rows -->
  <g>
    <rect x="120" y="160" width="200" height="40" rx="10" fill="#1d87f1"/>
    <text x="220" y="186" text-anchor="middle" class="tag">camelCase</text>
    <text x="350" y="188" class="code" fill="#166fde">userLoginCount</text>
    <text x="720" y="188" class="use">JavaScript &amp; Java variables and functions</text>
  </g>
  <g>
    <rect x="120" y="230" width="200" height="40" rx="10" fill="#059669"/>
    <text x="220" y="256" text-anchor="middle" class="tag">snake_case</text>
    <text x="350" y="258" class="code" fill="#047857">user_login_count</text>
    <text x="720" y="258" class="use">Python, Ruby, SQL columns</text>
  </g>
  <g>
    <rect x="120" y="300" width="200" height="40" rx="10" fill="#b45309"/>
    <text x="220" y="326" text-anchor="middle" class="tag">kebab-case</text>
    <text x="350" y="328" class="code" fill="#b45309">user-login-count</text>
    <text x="720" y="328" class="use">URLs, CSS classes, file names</text>
  </g>
  <g>
    <rect x="120" y="370" width="200" height="40" rx="10" fill="#7c3aed"/>
    <text x="220" y="396" text-anchor="middle" class="tag">PascalCase</text>
    <text x="350" y="398" class="code" fill="#7c3aed">UserLoginCount</text>
    <text x="720" y="398" class="use">Classes, React components, C# methods</text>
  </g>
  <g>
    <rect x="120" y="440" width="200" height="40" rx="10" fill="#475569"/>
    <text x="220" y="466" text-anchor="middle" class="tag">CONSTANT</text>
    <text x="350" y="468" class="code" fill="#475569">USER_LOGIN_COUNT</text>
    <text x="720" y="468" class="use">Constants and environment variables</text>
  </g>

  <rect x="180" y="530" width="840" height="52" rx="12" fill="#153056"/>
  <text x="600" y="564" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="21" font-weight="600" fill="#7ef0c0">URLs: kebab-case — Google treats hyphens as word separators, underscores as joiners</text>
</svg>
