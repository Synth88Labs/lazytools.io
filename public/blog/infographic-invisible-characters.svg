<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="Invisible characters hide inside normal-looking text. A string like hello world can secretly contain a zero-width space (U+200B) between the words, which is invisible on screen but real in the bytes. Common hidden characters: zero-width space U+200B, zero-width joiner U+200D, non-breaking space U+00A0, the byte-order mark U+FEFF, bidirectional controls, and tag characters in the range U+E0000 to U+E007F that are used to invisibly watermark AI-generated text. They break search, code and CSV parsing, and can fingerprint text. An AI chatbot cannot see or reliably remove them; a code-point scanner can.">
  <defs>
    <style>
      .h { font: 800 30px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#0f172a; }
      .lab { font: 800 18px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#334155; }
      .sub { font: 500 14px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#64748b; }
      .mono { font: 700 20px Consolas,Menlo,monospace; }
      .cp { font: 700 14px Consolas,Menlo,monospace; }
    </style>
  </defs>

  <text x="600" y="42" text-anchor="middle" class="h">👻 The hidden characters inside "normal" text</text>

  <!-- looks like vs really is -->
  <g transform="translate(90 74)">
    <rect x="0" y="0" width="470" height="110" rx="14" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
    <text x="20" y="30" class="sub">What you see</text>
    <text x="20" y="70" class="mono" fill="#0f172a">hello world</text>
    <text x="20" y="96" class="sub">looks completely normal ✓</text>
  </g>
  <text x="585" y="135" text-anchor="middle" font-size="28" fill="#94a3b8">→</text>
  <g transform="translate(640 74)">
    <rect x="0" y="0" width="470" height="110" rx="14" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
    <text x="20" y="30" class="sub">What's really there</text>
    <text x="20" y="70" class="mono" fill="#0f172a">hello<tspan fill="#b91c1c">[U+200B]</tspan>world</text>
    <text x="20" y="96" class="sub" fill="#92400e">a zero-width space hides between the words</text>
  </g>

  <!-- the usual suspects -->
  <text x="600" y="228" text-anchor="middle" class="lab">The usual suspects</text>
  <g transform="translate(90 244)" font-family="'Plus Jakarta Sans',sans-serif">
    <g transform="translate(0 0)"><rect width="330" height="56" rx="10" fill="#eff6ff" stroke="#1d87f1" stroke-width="1.5"/><text x="14" y="24" class="cp" fill="#1e3a8a">U+200B</text><text x="14" y="44" class="sub">Zero Width Space</text></g>
    <g transform="translate(350 0)"><rect width="330" height="56" rx="10" fill="#eff6ff" stroke="#1d87f1" stroke-width="1.5"/><text x="14" y="24" class="cp" fill="#1e3a8a">U+200D</text><text x="14" y="44" class="sub">Zero Width Joiner</text></g>
    <g transform="translate(700 0)"><rect width="330" height="56" rx="10" fill="#eff6ff" stroke="#1d87f1" stroke-width="1.5"/><text x="14" y="24" class="cp" fill="#1e3a8a">U+00A0</text><text x="14" y="44" class="sub">Non-Breaking Space</text></g>
    <g transform="translate(0 70)"><rect width="330" height="56" rx="10" fill="#eff6ff" stroke="#1d87f1" stroke-width="1.5"/><text x="14" y="24" class="cp" fill="#1e3a8a">U+FEFF</text><text x="14" y="44" class="sub">Byte-Order Mark (BOM)</text></g>
    <g transform="translate(350 70)"><rect width="330" height="56" rx="10" fill="#eff6ff" stroke="#1d87f1" stroke-width="1.5"/><text x="14" y="24" class="cp" fill="#1e3a8a">U+202E</text><text x="14" y="44" class="sub">Right-to-Left Override</text></g>
    <g transform="translate(700 70)"><rect width="330" height="56" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/><text x="14" y="24" class="cp" fill="#991b1b">U+E0000–E007F</text><text x="14" y="44" class="sub" fill="#991b1b">Tag chars — AI watermarking</text></g>
  </g>

  <rect x="90" y="452" width="1020" height="140" rx="16" fill="#153056"/>
  <text x="600" y="490" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="17" font-weight="800" fill="#ffffff">They break search, code and CSV parsing — and the tag characters can invisibly</text>
  <text x="600" y="516" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="17" font-weight="800" fill="#ffffff">fingerprint text as AI-generated.</text>
  <text x="600" y="552" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="15" font-weight="700" fill="#7ef0c0">An LLM literally can't see them. A code-point scanner reveals — and removes — every one.</text>
  <text x="600" y="578" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="14" font-weight="600" fill="#94a3b8">…and it runs entirely in your browser, so the text you're checking never leaves your device.</text>
</svg>
