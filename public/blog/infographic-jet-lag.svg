<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Flying west takes about one day per time zone and needs evening light; flying east takes about 1.5 days per zone and needs morning light.">
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="600" y="64" text-anchor="middle" font-family="system-ui, sans-serif" font-size="44" font-weight="800" fill="#0f172a">Direction matters more than distance</text>

  <!-- WEST -->
  <rect x="60" y="118" width="510" height="360" rx="20" fill="#ffffff" stroke="#bfdbfe" stroke-width="4"/>
  <text x="315" y="176" text-anchor="middle" font-family="system-ui, sans-serif" font-size="38" font-weight="800" fill="#1e3a8a">← FLYING WEST</text>
  <text x="315" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="54" font-weight="800" fill="#2563eb">≈1 day</text>
  <text x="315" y="272" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" fill="#334155">per time zone</text>
  <text x="315" y="326" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" fill="#475569">Your day gets LONGER</text>
  <text x="315" y="362" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#166534">Works with your clock</text>
  <rect x="96" y="392" width="438" height="62" rx="12" fill="#eff6ff"/>
  <text x="315" y="418" text-anchor="middle" font-family="system-ui, sans-serif" font-size="25" font-weight="700" fill="#1e3a8a">☀ Get EVENING light</text>
  <text x="315" y="446" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" fill="#475569">Avoid morning light</text>

  <!-- EAST -->
  <rect x="630" y="118" width="510" height="360" rx="20" fill="#ffffff" stroke="#fecaca" stroke-width="4"/>
  <text x="885" y="176" text-anchor="middle" font-family="system-ui, sans-serif" font-size="38" font-weight="800" fill="#991b1b">FLYING EAST →</text>
  <text x="885" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="54" font-weight="800" fill="#dc2626">≈1.5 days</text>
  <text x="885" y="272" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" fill="#334155">per time zone</text>
  <text x="885" y="326" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" fill="#475569">Your day gets SHORTER</text>
  <text x="885" y="362" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#991b1b">Fights your clock</text>
  <rect x="666" y="392" width="438" height="62" rx="12" fill="#fef2f2"/>
  <text x="885" y="418" text-anchor="middle" font-family="system-ui, sans-serif" font-size="25" font-weight="700" fill="#991b1b">☀ Get MORNING light</text>
  <text x="885" y="446" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" fill="#475569">Avoid evening light</text>

  <rect x="60" y="512" width="1080" height="146" rx="18" fill="#0f172a"/>
  <text x="600" y="562" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" font-weight="800" fill="#f8fafc">Why? ~75% of people have a body clock slightly longer than 24 h.</text>
  <text x="600" y="606" text-anchor="middle" font-family="system-ui, sans-serif" font-size="27" fill="#cbd5e1">Delaying it (west) is easy. Advancing it (east) is not.</text>
  <text x="600" y="642" text-anchor="middle" font-family="system-ui, sans-serif" font-size="25" font-weight="700" fill="#7dd3fc">Timed light can compress this to 2–3 zones per day.</text>
</svg>
