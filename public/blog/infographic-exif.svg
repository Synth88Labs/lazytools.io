<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-label="A photo file contains visible pixels plus hidden metadata: EXIF device and timestamp, GPS coordinates accurate to about 5 meters, XMP editing history. Social platforms strip metadata on upload; email, cloud drive links, marketplaces and forums pass the original file through.">
  <defs>
    <style>
      .h { font: 800 30px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .lab { font: 700 19px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .sub { font: 500 16px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .tag { font: 700 15px Consolas, Menlo, monospace; fill: #7f1d1d; }
      .card-t { font: 800 19px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; }
      .item { font: 600 16px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <text x="600" y="44" text-anchor="middle" class="h">The photo you see — and the manifest riding inside it</text>

  <!-- photo card -->
  <g transform="translate(90 90)">
    <rect x="0" y="0" width="300" height="230" rx="16" fill="#eef9ff" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="80" cy="70" r="28" fill="#fbbf24"/>
    <path d="M20 180 L110 100 L180 160 L230 120 L280 170 L280 210 L20 210 Z" fill="#059669"/>
    <text x="150" y="30" text-anchor="middle" class="lab">what you see</text>
  </g>

  <text x="440" y="205" class="h" fill="#dc2626">+</text>

  <!-- metadata card -->
  <g transform="translate(500 90)">
    <rect x="0" y="0" width="610" height="230" rx="16" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="305" y="34" text-anchor="middle" class="lab">what rides along (EXIF / XMP)</text>
    <text x="30" y="72" class="tag">Device: Phone 15 Pro · 2026-06-21 18:42:07</text>
    <text x="30" y="106" class="tag">GPS: 27.7172° N, 85.3240° E ± ~5 m</text>
    <text x="30" y="140" class="tag">Software: PhotoEditor 8.2 (edit history)</text>
    <text x="30" y="174" class="tag">Thumbnail: embedded pre-crop preview</text>
    <rect x="28" y="192" width="300" height="26" rx="13" fill="#dc2626"/>
    <text x="178" y="210" text-anchor="middle" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-size="14" font-weight="800" fill="#ffffff">GPS pinpoints a building, not a city</text>
  </g>

  <!-- channels comparison -->
  <g transform="translate(90 370)">
    <rect x="0" y="0" width="490" height="160" rx="16" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
    <text x="245" y="36" text-anchor="middle" class="card-t" fill="#065f46">✓ Usually stripped on upload</text>
    <text x="245" y="72" text-anchor="middle" class="item">Major social platforms</text>
    <text x="245" y="100" text-anchor="middle" class="item">(they re-process every image)</text>
    <text x="245" y="136" text-anchor="middle" class="sub">…for what other users download</text>
  </g>
  <g transform="translate(620 370)">
    <rect x="0" y="0" width="490" height="160" rx="16" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="245" y="36" text-anchor="middle" class="card-t" fill="#991b1b">✗ Passed through untouched</text>
    <text x="245" y="70" text-anchor="middle" class="item">Email attachments · cloud-drive links</text>
    <text x="245" y="98" text-anchor="middle" class="item">marketplace listings · forums</text>
    <text x="245" y="136" text-anchor="middle" class="sub">full quality = metadata included</text>
  </g>

  <rect x="240" y="562" width="720" height="46" rx="12" fill="#153056"/>
  <text x="600" y="592" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="19" font-weight="600" fill="#7ef0c0">strip before sharing — locally, not via someone's server</text>
</svg>
