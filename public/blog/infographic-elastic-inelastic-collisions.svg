<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="Elastic versus inelastic collisions. In both types momentum is conserved. In an elastic collision kinetic energy is also conserved and the objects bounce apart; the coefficient of restitution e equals 1. In a perfectly inelastic collision kinetic energy is not conserved — some becomes heat, sound and deformation — and the objects stick together and move as one; e equals 0. Real collisions fall in between, 0 less than e less than 1. Worked elastic example: a 2 kg ball at 3 metres per second hits a stationary 1 kg ball; afterward they move at 1 and 4 metres per second, conserving both momentum (6) and kinetic energy (9 joules).">
  <defs>
    <style>
      .h { font: 800 27px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .sub { font: 500 15px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .ct { font: 800 18px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; }
      .lab { font: 600 14px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .ex { font: 800 15px Consolas, Menlo, monospace; fill: #0f172a; }
      .tag { font: 800 13px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>

  <text x="600" y="40" text-anchor="middle" class="h">Elastic vs inelastic collisions</text>
  <text x="600" y="66" text-anchor="middle" class="sub">momentum is always conserved — kinetic energy only if the collision is elastic</text>

  <!-- Elastic panel -->
  <g transform="translate(70 92)">
    <rect x="0" y="0" width="500" height="230" rx="16" fill="#ecfdf5" stroke="#059669"/>
    <text x="24" y="34" class="ct" fill="#047857">Elastic  (e = 1)</text>
    <!-- before -->
    <text x="24" y="66" class="lab">Before:</text>
    <circle cx="120" cy="61" r="16" fill="#34d399"/><text x="120" y="66" text-anchor="middle" class="tag" fill="#064e3b">2kg</text>
    <text x="150" y="55" class="ex" fill="#047857">→ 3 m/s</text>
    <circle cx="300" cy="61" r="12" fill="#a7f3d0"/><text x="300" y="65" text-anchor="middle" class="tag" fill="#064e3b">1kg</text>
    <text x="330" y="55" class="ex" fill="#64748b">0 m/s</text>
    <!-- after -->
    <text x="24" y="112" class="lab">After:</text>
    <circle cx="120" cy="107" r="16" fill="#34d399"/><text x="120" y="111" text-anchor="middle" class="tag" fill="#064e3b">2kg</text>
    <text x="150" y="101" class="ex" fill="#047857">→ 1 m/s</text>
    <circle cx="320" cy="107" r="12" fill="#a7f3d0"/><text x="320" y="111" text-anchor="middle" class="tag" fill="#064e3b">1kg</text>
    <text x="350" y="101" class="ex" fill="#047857">→ 4 m/s</text>
    <line x1="24" y1="130" x2="476" y2="130" stroke="#059669" stroke-opacity="0.3"/>
    <text x="24" y="158" class="lab">✓ Momentum conserved: 6 kg·m/s</text>
    <text x="24" y="182" class="lab">✓ Kinetic energy conserved: 9 J → 9 J</text>
    <text x="24" y="212" class="lab" fill="#047857">The objects bounce apart.</text>
  </g>

  <!-- Inelastic panel -->
  <g transform="translate(630 92)">
    <rect x="0" y="0" width="500" height="230" rx="16" fill="#fff7ed" stroke="#d97706"/>
    <text x="24" y="34" class="ct" fill="#b45309">Perfectly inelastic  (e = 0)</text>
    <text x="24" y="66" class="lab">Before:</text>
    <circle cx="120" cy="61" r="16" fill="#fbbf24"/><text x="120" y="66" text-anchor="middle" class="tag" fill="#78350f">2kg</text>
    <text x="150" y="55" class="ex" fill="#b45309">→ 3 m/s</text>
    <circle cx="300" cy="61" r="12" fill="#fde68a"/><text x="300" y="65" text-anchor="middle" class="tag" fill="#78350f">1kg</text>
    <text x="330" y="55" class="ex" fill="#64748b">0 m/s</text>
    <text x="24" y="112" class="lab">After:</text>
    <circle cx="150" cy="107" r="16" fill="#fbbf24"/><circle cx="168" cy="107" r="12" fill="#fde68a"/><text x="200" y="111" class="ex" fill="#b45309">→ 2 m/s (stuck)</text>
    <line x1="24" y1="130" x2="476" y2="130" stroke="#d97706" stroke-opacity="0.3"/>
    <text x="24" y="158" class="lab">✓ Momentum conserved: 6 kg·m/s</text>
    <text x="24" y="182" class="lab">✗ Kinetic energy: 9 J → 6 J (3 J lost)</text>
    <text x="24" y="212" class="lab" fill="#b45309">They stick and move as one.</text>
  </g>

  <!-- band -->
  <g transform="translate(70 344)">
    <rect x="0" y="0" width="1060" height="52" rx="14" fill="#0f172a"/>
    <text x="530" y="33" text-anchor="middle" class="ex" fill="#7ef0c0">real collisions sit between:  0 &lt; e &lt; 1  —  some kinetic energy lost to heat, sound &amp; deformation</text>
  </g>

  <text x="600" y="432" text-anchor="middle" class="lab">The coefficient of restitution e = (relative speed after) ÷ (relative speed before) sets where a collision falls.</text>

  <!-- footer -->
  <g transform="translate(70 470)">
    <rect x="0" y="0" width="1060" height="50" rx="14" fill="#0c2f6b"/>
    <text x="24" y="31" font-family="Consolas, Menlo, monospace" font-size="14" fill="#7ef0c0">lazytools.io — 1D collision calculator: final velocities, momentum &amp; energy, elastic to inelastic</text>
  </g>

  <text x="600" y="560" text-anchor="middle" class="sub">Equal masses in an elastic collision simply exchange velocities — the classic Newton's-cradle result.</text>
</svg>
