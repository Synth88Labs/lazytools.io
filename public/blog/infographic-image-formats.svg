<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="Image format decision guide: photographs go to JPEG or WebP, screenshots and text to PNG, transparency needs PNG or WebP. The size workflow: a 4000 pixel 8 MB photo resized to 1200 pixels then compressed at quality 80 ends around 0.3 MB — a 96 percent reduction.">
  <defs>
    <style>
      .h { font: 800 30px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .lab { font: 700 19px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .sub { font: 500 15px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .fmt { font: 800 26px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; }
      .step { font: 700 18px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #153056; }
      .size { font: 800 22px Consolas, Menlo, monospace; }
    </style>
  </defs>

  <text x="600" y="44" text-anchor="middle" class="h">Pick the format by content — win the size by workflow</text>

  <!-- three format cards -->
  <g transform="translate(75 80)">
    <rect x="0" y="0" width="330" height="190" rx="16" fill="#eef9ff" stroke="#1d87f1" stroke-width="2"/>
    <text x="165" y="44" text-anchor="middle" class="fmt" fill="#153056">JPEG / WebP</text>
    <text x="165" y="80" text-anchor="middle" class="lab">photographs</text>
    <text x="165" y="112" text-anchor="middle" class="sub">lossy, tuned for gradients &amp; detail</text>
    <text x="165" y="136" text-anchor="middle" class="sub">WebP ≈ 25–35% smaller than JPEG</text>
    <text x="165" y="170" text-anchor="middle" class="sub" font-weight="700" fill="#dc2626">no JPEG transparency — ever</text>
  </g>
  <g transform="translate(435 80)">
    <rect x="0" y="0" width="330" height="190" rx="16" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
    <text x="165" y="44" text-anchor="middle" class="fmt" fill="#065f46">PNG</text>
    <text x="165" y="80" text-anchor="middle" class="lab">screenshots · text · diagrams</text>
    <text x="165" y="112" text-anchor="middle" class="sub">lossless — sharp edges stay sharp</text>
    <text x="165" y="136" text-anchor="middle" class="sub">full transparency support</text>
    <text x="165" y="170" text-anchor="middle" class="sub" font-weight="700" fill="#dc2626">wrong bet for photos: huge files</text>
  </g>
  <g transform="translate(795 80)">
    <rect x="0" y="0" width="330" height="190" rx="16" fill="#fefce8" stroke="#b45309" stroke-width="2"/>
    <text x="165" y="44" text-anchor="middle" class="fmt" fill="#92400e">Transparency?</text>
    <text x="165" y="80" text-anchor="middle" class="lab">PNG or WebP only</text>
    <text x="165" y="112" text-anchor="middle" class="sub">JPEG has no alpha channel —</text>
    <text x="165" y="136" text-anchor="middle" class="sub">transparent areas get flattened</text>
    <text x="165" y="170" text-anchor="middle" class="sub">onto a solid background</text>
  </g>

  <!-- workflow -->
  <text x="600" y="330" text-anchor="middle" class="lab">The 90%+ workflow: resize → compress</text>
  <g transform="translate(105 355)">
    <rect x="0" y="0" width="280" height="130" rx="14" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="140" y="34" text-anchor="middle" class="step">1 · Original phone photo</text>
    <text x="140" y="70" text-anchor="middle" class="size" fill="#dc2626">4000 px · 8 MB</text>
    <text x="140" y="104" text-anchor="middle" class="sub">displayed at 600 px — 25× the pixels wasted</text>
  </g>
  <text x="425" y="425" text-anchor="middle" class="fmt" fill="#64748b">→</text>
  <g transform="translate(460 355)">
    <rect x="0" y="0" width="280" height="130" rx="14" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="140" y="34" text-anchor="middle" class="step">2 · Resize (aspect locked)</text>
    <text x="140" y="70" text-anchor="middle" class="size" fill="#b45309">1200 px · ~1 MB</text>
    <text x="140" y="104" text-anchor="middle" class="sub">2× display width = retina-sharp</text>
  </g>
  <text x="780" y="425" text-anchor="middle" class="fmt" fill="#64748b">→</text>
  <g transform="translate(815 355)">
    <rect x="0" y="0" width="280" height="130" rx="14" fill="#ffffff" stroke="#059669" stroke-width="3"/>
    <text x="140" y="34" text-anchor="middle" class="step">3 · Compress q80</text>
    <text x="140" y="70" text-anchor="middle" class="size" fill="#059669">~0.3 MB ✓</text>
    <text x="140" y="104" text-anchor="middle" class="sub">≈96% smaller — no visible change</text>
  </g>

  <rect x="255" y="545" width="690" height="46" rx="12" fill="#153056"/>
  <text x="600" y="575" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="19" font-weight="600" fill="#7ef0c0">resize first, compress second — never the reverse</text>
</svg>
