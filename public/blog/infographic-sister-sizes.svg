<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="Sister sizes explained: 32DDD, 34DD and 36D hold the same cup volume on different band lengths — band down means cup letter up">
  <defs>
    <linearGradient id="cupg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3fa9fd"/>
      <stop offset="1" stop-color="#1465cf"/>
    </linearGradient>
    <style>
      .h { font: 800 30px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .size { font: 800 30px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #153056; }
      .lab { font: 700 20px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .sub { font: 500 17px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .band { stroke-linecap: round; fill: none; }
      .eq { font: 800 40px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #94a3b8; }
    </style>
  </defs>

  <text x="600" y="46" text-anchor="middle" class="h">Sister sizes: same cup volume, different band</text>

  <!-- three panels: identical cup circles (r=68), bands of different arc width -->
  <!-- 32DDD -->
  <g>
    <path class="band" d="M 130 250 Q 230 320 330 250" stroke="#94a3b8" stroke-width="14"/>
    <circle cx="230" cy="230" r="68" fill="url(#cupg)"/>
    <circle cx="208" cy="208" r="16" fill="#ffffff" opacity="0.35"/>
    <text x="230" y="370" text-anchor="middle" class="size">32 DDD</text>
    <text x="230" y="400" text-anchor="middle" class="sub">shorter band · higher letter</text>
  </g>
  <text x="392" y="250" text-anchor="middle" class="eq">=</text>

  <!-- 34DD (reference) -->
  <g>
    <path class="band" d="M 440 250 Q 570 330 700 250" stroke="#64748b" stroke-width="14"/>
    <circle cx="570" cy="230" r="68" fill="url(#cupg)"/>
    <circle cx="548" cy="208" r="16" fill="#ffffff" opacity="0.35"/>
    <rect x="500" y="330" width="140" height="34" rx="17" fill="#eef9ff" stroke="#8ed9ff" stroke-width="2"/>
    <text x="570" y="354" text-anchor="middle" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="#166fde">your size</text>
    <text x="570" y="400" text-anchor="middle" class="size">34 DD</text>
  </g>
  <text x="748" y="250" text-anchor="middle" class="eq">=</text>

  <!-- 36D -->
  <g>
    <path class="band" d="M 810 250 Q 970 345 1130 250" stroke="#94a3b8" stroke-width="14"/>
    <circle cx="970" cy="230" r="68" fill="url(#cupg)"/>
    <circle cx="948" cy="208" r="16" fill="#ffffff" opacity="0.35"/>
    <text x="970" y="370" text-anchor="middle" class="size">36 D</text>
    <text x="970" y="400" text-anchor="middle" class="sub">longer band · lower letter</text>
  </g>

  <!-- rule strips -->
  <rect x="150" y="450" width="430 " height="56" rx="14" fill="#059669"/>
  <text x="365" y="486" text-anchor="middle" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-size="20" font-weight="700" fill="#ffffff">band rides up? → band ↓ cup ↑ (34DD → 32DDD)</text>
  <rect x="620" y="450" width="430" height="56" rx="14" fill="#b45309"/>
  <text x="835" y="486" text-anchor="middle" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-size="20" font-weight="700" fill="#ffffff">band digs in? → band ↑ cup ↓ (34DD → 36D)</text>

  <!-- footer -->
  <rect x="180" y="540" width="840" height="52" rx="12" fill="#153056"/>
  <text x="600" y="574" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="22" font-weight="600" fill="#7ef0c0">cup letters are relative to the band — the volume stays constant</text>
</svg>
