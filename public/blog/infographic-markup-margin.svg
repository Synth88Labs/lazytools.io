<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="Markup versus margin, the same profit measured two ways. Buy for 60 dollars, sell for 100 dollars, so profit is 40 dollars. Markup is profit divided by cost: 40 over 60 equals 66.7 percent — how much you added on top of what you paid. Margin is profit divided by price: 40 over 100 equals 40 percent — the share of the selling price you keep. Markup is always the larger number, and they are never equal. To convert, margin equals markup divided by one plus markup, and markup equals margin divided by one minus margin. A common costly mistake is setting a 40 percent markup when you meant a 40 percent margin, which leaves you with only a 28.6 percent margin.">
  <defs>
    <style>
      .h { font: 800 30px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#0f172a; }
      .lab { font: 700 18px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#334155; }
      .sub { font: 500 15px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#64748b; }
      .big { font: 800 21px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; }
      .mono { font: 700 17px Consolas,Menlo,monospace; }
      .monoBig { font: 800 30px Consolas,Menlo,monospace; }
    </style>
  </defs>

  <text x="600" y="42" text-anchor="middle" class="h">🏷️ Same $40 profit — two different percentages</text>
  <text x="600" y="72" text-anchor="middle" class="sub">Cost $60 · Sell $100 · Profit = $40. The question is: percent of <tspan font-style="italic">what?</tspan></text>

  <!-- number line: cost + profit = price -->
  <g transform="translate(150 100)">
    <rect x="0" y="0" width="540" height="60" rx="10" fill="#dbeafe" stroke="#1d87f1" stroke-width="2"/>
    <text x="270" y="37" text-anchor="middle" class="big" fill="#1e3a8a">COST $60</text>
    <rect x="540" y="0" width="360" height="60" rx="10" fill="#dcfce7" stroke="#059669" stroke-width="2"/>
    <text x="720" y="37" text-anchor="middle" class="big" fill="#065f46">PROFIT $40</text>
    <text x="450" y="92" text-anchor="middle" class="sub">← selling price $100 →</text>
  </g>

  <!-- markup card -->
  <g transform="translate(150 226)">
    <rect x="0" y="0" width="430" height="200" rx="16" fill="#eff6ff" stroke="#1d87f1" stroke-width="2"/>
    <text x="215" y="42" text-anchor="middle" class="big" fill="#1e3a8a">MARKUP — on cost</text>
    <text x="215" y="92" text-anchor="middle" class="mono" fill="#0f172a">profit ÷ cost = 40 ÷ 60</text>
    <text x="215" y="150" text-anchor="middle" class="monoBig" fill="#1e3a8a">66.7%</text>
    <text x="215" y="180" text-anchor="middle" class="sub">what you add on top of what you paid</text>
  </g>

  <!-- margin card -->
  <g transform="translate(620 226)">
    <rect x="0" y="0" width="430" height="200" rx="16" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
    <text x="215" y="42" text-anchor="middle" class="big" fill="#065f46">MARGIN — on price</text>
    <text x="215" y="92" text-anchor="middle" class="mono" fill="#0f172a">profit ÷ price = 40 ÷ 100</text>
    <text x="215" y="150" text-anchor="middle" class="monoBig" fill="#065f46">40%</text>
    <text x="215" y="180" text-anchor="middle" class="sub">the share of revenue you keep</text>
  </g>

  <!-- convert strip -->
  <g transform="translate(150 452)">
    <rect x="0" y="0" width="900" height="52" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <text x="450" y="33" text-anchor="middle" class="mono" fill="#334155">margin = markup ÷ (1 + markup)   ·   markup = margin ÷ (1 − margin)</text>
  </g>

  <rect x="150" y="524" width="900" height="76" rx="14" fill="#153056"/>
  <text x="600" y="558" text-anchor="middle" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-size="16" font-weight="800" fill="#ffffff">Markup is always bigger than margin — because cost is smaller than price.</text>
  <text x="600" y="584" text-anchor="middle" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#fca5a5">Set a 40% markup thinking it's margin? You actually keep just 28.6%.</text>
</svg>
