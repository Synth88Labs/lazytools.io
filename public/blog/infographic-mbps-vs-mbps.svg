<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="A byte is 8 bits, so you divide the megabit speed by 8 to get megabytes per second. 100 Mbps equals 12.5 MB/s. Examples: 25 Mbps is about 3.1 MB/s, 300 Mbps is 37.5 MB/s, and 1 Gbps is 125 MB/s. Lowercase b means bits (speed); uppercase B means bytes (files).">
  <defs>
    <style>
      .title { font: 800 40px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#0f172a; }
      .sub { font: 600 22px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#64748b; }
      .hero { font: 800 60px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; }
      .heroSub { font: 600 22px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#64748b; }
      .ex { font: 700 30px Consolas,Menlo,monospace; fill:#0f172a; }
      .key { font: 700 24px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="700" fill="#f8fafc" />
  <text x="600" y="62" text-anchor="middle" class="title">Mbps vs MB/s — divide by 8</text>
  <text x="600" y="98" text-anchor="middle" class="sub">Speed is measured in bits; files in bytes. A byte = 8 bits.</text>

  <!-- Hero equation -->
  <rect x="70" y="140" width="1060" height="180" rx="18" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2" />
  <text x="250" y="235" text-anchor="middle" class="hero" fill="#1d4ed8">100 Mbps</text>
  <text x="250" y="272" text-anchor="middle" class="heroSub">megabits / second</text>
  <text x="560" y="238" text-anchor="middle" class="hero" fill="#475569">÷ 8</text>
  <text x="900" y="235" text-anchor="middle" class="hero" fill="#0f766e">12.5 MB/s</text>
  <text x="900" y="272" text-anchor="middle" class="heroSub">megabytes / second</text>

  <!-- Examples: 3 big rows -->
  <g class="ex">
    <text x="150" y="410">25 Mbps</text><text x="470" y="410" fill="#94a3b8">=</text><text x="540" y="410" fill="#0f766e">3.1 MB/s</text>
    <text x="150" y="470">300 Mbps</text><text x="470" y="470" fill="#94a3b8">=</text><text x="540" y="470" fill="#0f766e">37.5 MB/s</text>
    <text x="150" y="530">1 Gbps</text><text x="470" y="530" fill="#94a3b8">=</text><text x="540" y="530" fill="#0f766e">125 MB/s</text>
  </g>

  <!-- Lowercase b vs uppercase B -->
  <rect x="820" y="370" width="310" height="185" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="2" />
  <text x="850" y="420" class="key" fill="#1d4ed8">b = bits</text>
  <text x="850" y="450" class="sub">internet speed</text>
  <text x="850" y="505" class="key" fill="#0f766e">B = bytes</text>
  <text x="850" y="535" class="sub">file sizes</text>

  <!-- Bottom takeaway -->
  <rect x="70" y="590" width="1060" height="70" rx="14" fill="#fefce8" stroke="#fde68a" stroke-width="2" />
  <text x="600" y="634" text-anchor="middle" class="key" fill="#854d0e">A 1 GB file on 100 Mbps takes about 80 seconds — not 10.</text>
</svg>
