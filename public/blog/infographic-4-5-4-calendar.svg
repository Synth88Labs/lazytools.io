<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="The 4-5-4 retail calendar: four quarters of 13 weeks each, every quarter split into a 4-week month, a 5-week month and a 4-week month, running February through January for 52 weeks and 364 days. The retail year ends on the Saturday nearest 31 January, and a 53rd week is added to January every 5 to 6 years.">
  <defs>
    <style>
      .h { font: 800 30px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .lab { font: 700 18px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .sub { font: 500 15px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .qh { font: 800 17px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; }
      .mon { font: 700 15px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .wk { font: 800 22px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>

  <text x="600" y="42" text-anchor="middle" class="h">The 4-5-4 retail year: 4 quarters × 13 weeks</text>
  <text x="600" y="70" text-anchor="middle" class="sub">each quarter = a 4-week, a 5-week and a 4-week month · 52 weeks · 364 days</text>

  <!-- four quarter blocks -->
  <!-- x layout: 4 columns from x=60 width 260 gap 24 -->
  <!-- Q1 -->
  <g transform="translate(60 100)">
    <rect x="0" y="0" width="264" height="230" rx="14" fill="#eef9ff" stroke="#1d87f1" stroke-width="2"/>
    <text x="132" y="30" text-anchor="middle" class="qh" fill="#153056">Q1 · 13 weeks</text>
    <g transform="translate(16 48)">
      <rect x="0" y="0" width="232" height="48" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="16" y="30" class="mon">February</text><text x="216" y="30" text-anchor="end" class="wk" fill="#64748b">4</text>
      <rect x="0" y="58" width="232" height="60" rx="8" fill="#dbeafe" stroke="#1d87f1"/>
      <text x="16" y="93" class="mon">March</text><text x="216" y="93" text-anchor="end" class="wk" fill="#1d87f1">5</text>
      <rect x="0" y="128" width="232" height="48" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="16" y="158" class="mon">April</text><text x="216" y="158" text-anchor="end" class="wk" fill="#64748b">4</text>
    </g>
  </g>
  <!-- Q2 -->
  <g transform="translate(348 100)">
    <rect x="0" y="0" width="264" height="230" rx="14" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
    <text x="132" y="30" text-anchor="middle" class="qh" fill="#065f46">Q2 · 13 weeks</text>
    <g transform="translate(16 48)">
      <rect x="0" y="0" width="232" height="48" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="16" y="30" class="mon">May</text><text x="216" y="30" text-anchor="end" class="wk" fill="#64748b">4</text>
      <rect x="0" y="58" width="232" height="60" rx="8" fill="#dcfce7" stroke="#059669"/>
      <text x="16" y="93" class="mon">June</text><text x="216" y="93" text-anchor="end" class="wk" fill="#059669">5</text>
      <rect x="0" y="128" width="232" height="48" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="16" y="158" class="mon">July</text><text x="216" y="158" text-anchor="end" class="wk" fill="#64748b">4</text>
    </g>
  </g>
  <!-- Q3 -->
  <g transform="translate(636 100)">
    <rect x="0" y="0" width="264" height="230" rx="14" fill="#fefce8" stroke="#b45309" stroke-width="2"/>
    <text x="132" y="30" text-anchor="middle" class="qh" fill="#92400e">Q3 · 13 weeks</text>
    <g transform="translate(16 48)">
      <rect x="0" y="0" width="232" height="48" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="16" y="30" class="mon">August</text><text x="216" y="30" text-anchor="end" class="wk" fill="#64748b">4</text>
      <rect x="0" y="58" width="232" height="60" rx="8" fill="#fef9c3" stroke="#b45309"/>
      <text x="16" y="93" class="mon">September</text><text x="216" y="93" text-anchor="end" class="wk" fill="#b45309">5</text>
      <rect x="0" y="128" width="232" height="48" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="16" y="158" class="mon">October</text><text x="216" y="158" text-anchor="end" class="wk" fill="#64748b">4</text>
    </g>
  </g>
  <!-- Q4 -->
  <g transform="translate(924 100)">
    <rect x="0" y="0" width="264" height="230" rx="14" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="132" y="30" text-anchor="middle" class="qh" fill="#5b21b6">Q4 · 13 weeks</text>
    <g transform="translate(16 48)">
      <rect x="0" y="0" width="232" height="48" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="16" y="30" class="mon">November</text><text x="216" y="30" text-anchor="end" class="wk" fill="#64748b">4</text>
      <rect x="0" y="58" width="232" height="60" rx="8" fill="#f3e8ff" stroke="#7c3aed"/>
      <text x="16" y="93" class="mon">December</text><text x="216" y="93" text-anchor="end" class="wk" fill="#7c3aed">5</text>
      <rect x="0" y="128" width="232" height="48" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="16" y="158" class="mon">January</text><text x="216" y="158" text-anchor="end" class="wk" fill="#64748b">4<tspan class="sub" dx="4">(+1 in 53-wk yrs)</tspan></text>
    </g>
  </g>

  <!-- bottom facts -->
  <g transform="translate(60 360)">
    <rect x="0" y="0" width="546" height="90" rx="12" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="20" y="34" class="lab">📆 Starts the Sunday nearest 1 February</text>
    <text x="20" y="66" class="sub">ends the Saturday nearest 31 January — every month ends on a Saturday</text>
  </g>
  <g transform="translate(642 360)">
    <rect x="0" y="0" width="546" height="90" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="20" y="34" class="lab" fill="#991b1b">➕ 52 weeks = 364 days → drifts 1 day/year</text>
    <text x="20" y="66" class="sub">a 53rd week is added to January every 5–6 yrs (FY2012, FY2017, FY2023)</text>
  </g>

  <rect x="230" y="478" width="740" height="52" rx="12" fill="#153056"/>
  <text x="600" y="504" text-anchor="middle" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-size="17" font-weight="700" fill="#ffffff">Why bother? Same weekdays &amp; weekend count every year =</text>
  <text x="600" y="524" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="16" font-weight="600" fill="#7ef0c0">this March compares like-for-like to last March</text>

  <text x="600" y="576" text-anchor="middle" class="sub">The 5-week months (March, June, September, December) are shaded. Q1 begins with retail "February".</text>
</svg>
