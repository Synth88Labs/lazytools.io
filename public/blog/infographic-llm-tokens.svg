<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="How LLM tokens work: text is split into sub-word tokens, roughly 4 characters per token in English. API cost equals input tokens times input price plus output tokens times output price, per million tokens. OpenAI counts can be computed exactly in the browser with the published o200k tokenizer; Claude and Gemini counts are estimates because those tokenizers are not public — and Anthropic's newer models produce approximately 30% more tokens for the same text.">
  <defs>
    <style>
      .h { font: 800 30px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .lab { font: 700 19px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .sub { font: 500 15px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .big { font: 800 20px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; }
      .mono { font: 700 16px Consolas, Menlo, monospace; }
      .tok { font: 700 15px Consolas, Menlo, monospace; }
    </style>
  </defs>

  <text x="600" y="42" text-anchor="middle" class="h">🪙 Models don't read words — they read tokens</text>

  <!-- tokenization example -->
  <g transform="translate(150 72)">
    <text x="0" y="18" class="lab">"unbelievable pricing"</text>
    <text x="290" y="18" class="sub">becomes</text>
    <g transform="translate(390 -6)">
      <rect x="0" y="0" width="52" height="34" rx="8" fill="#dbeafe"/><text x="26" y="22" text-anchor="middle" class="tok" fill="#1e40af">un</text>
      <rect x="58" y="0" width="118" height="34" rx="8" fill="#dcfce7"/><text x="117" y="22" text-anchor="middle" class="tok" fill="#166534">believ</text>
      <rect x="182" y="0" width="88" height="34" rx="8" fill="#fef9c3"/><text x="226" y="22" text-anchor="middle" class="tok" fill="#854d0e">able</text>
      <rect x="276" y="0" width="128" height="34" rx="8" fill="#fce7f3"/><text x="340" y="22" text-anchor="middle" class="tok" fill="#9d174d">·pricing</text>
    </g>
    <text x="600" y="58" text-anchor="middle" class="sub">sub-word chunks · ~4 characters ≈ 1 token in English · ~¾ of a word</text>
  </g>

  <!-- cost formula -->
  <g transform="translate(150 190)">
    <rect x="0" y="0" width="900" height="70" rx="14" fill="#153056"/>
    <text x="450" y="30" text-anchor="middle" class="mono" fill="#7ef0c0">cost = (input tokens ÷ 1M × input $) + (output tokens ÷ 1M × output $)</text>
    <text x="450" y="55" text-anchor="middle" class="sub" fill="#94a3b8">output tokens usually cost 5–6× more than input tokens — the reply is the expensive part</text>
  </g>

  <!-- exact vs estimate -->
  <text x="600" y="316" text-anchor="middle" class="lab">Which counts can actually be exact?</text>
  <g transform="translate(90 336)">
    <rect x="0" y="0" width="490" height="170" rx="14" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
    <text x="245" y="34" text-anchor="middle" class="big" fill="#065f46">✓ OpenAI — EXACT</text>
    <text x="245" y="64" text-anchor="middle" class="sub">the o200k tokenizer is published;</text>
    <text x="245" y="86" text-anchor="middle" class="sub">it runs fully in your browser,</text>
    <text x="245" y="108" text-anchor="middle" class="sub">so the count is the real count</text>
    <text x="245" y="146" text-anchor="middle" class="sub" font-weight="700" fill="#065f46">no upload, no API call, no guessing</text>
  </g>
  <g transform="translate(620 336)">
    <rect x="0" y="0" width="490" height="170" rx="14" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
    <text x="245" y="34" text-anchor="middle" class="big" fill="#92400e">≈ Claude &amp; Gemini — ESTIMATE</text>
    <text x="245" y="64" text-anchor="middle" class="sub">tokenizers aren't public — only their APIs</text>
    <text x="245" y="86" text-anchor="middle" class="sub">count exactly. Heuristic: chars ÷ 4,</text>
    <text x="245" y="108" text-anchor="middle" class="sub">× 1.3 for Anthropic's newer models —</text>
    <text x="245" y="146" text-anchor="middle" class="sub" font-weight="700" fill="#92400e">their new tokenizer: ~30% more tokens</text>
  </g>

  <rect x="200" y="546" width="800" height="52" rx="12" fill="#eef9ff" stroke="#1d87f1" stroke-width="2"/>
  <text x="600" y="568" text-anchor="middle" class="sub" font-weight="700" fill="#1e3a8a">Any tool claiming EXACT Claude or Gemini counts without calling the vendor's API is guessing.</text>
  <text x="600" y="588" text-anchor="middle" class="sub" fill="#1e3a8a">Honest counters label which is which — and never upload the text you paste.</text>
</svg>
