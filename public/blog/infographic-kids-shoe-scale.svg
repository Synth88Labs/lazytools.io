<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-label="The US kids' shoe scale: child sizes 2C to 13.5C, then youth sizes restart at 1Y — 1Y is bigger than 13.5C — shown as a growth ladder with ages">
  <defs>
    <linearGradient id="c" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3fa9fd"/>
      <stop offset="1" stop-color="#1465cf"/>
    </linearGradient>
    <linearGradient id="y" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2fc98e"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <style>
      .h { font: 800 30px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .seg { font: 800 22px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .lab { font: 700 20px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .sub { font: 500 17px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .age { font: 600 16px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #64748b; }
    </style>
  </defs>

  <text x="600" y="46" text-anchor="middle" class="h">The kids' scale restarts — 1Y is BIGGER than 13.5C</text>

  <!-- growth ladder: one bar, C segment then Y segment; length ∝ foot cm (9.5→25) scale x = 90 + (cm-9)*60 -->
  <text x="90" y="130" class="lab">The "C" (child) scale · 2C → 13.5C</text>
  <rect x="90" y="146" width="612" height="58" rx="12" fill="url(#c)"/>
  <text x="120" y="183" class="seg">2C</text>
  <text x="380" y="183" text-anchor="middle" class="seg">foot 9.5 → 19.4 cm</text>
  <text x="672" y="183" text-anchor="end" class="seg">13.5C</text>
  <text x="90" y="230" class="age">≈ 0–6 mo</text>
  <text x="672" y="230" text-anchor="end" class="age">≈ 6–7 yr</text>

  <!-- restart arrow -->
  <path d="M 702 175 q 60 0 60 60 q 0 55 -55 55 l -530 0" fill="none" stroke="#94a3b8" stroke-width="4" stroke-dasharray="8 7"/>
  <text x="790" y="230" class="lab" fill="#dc2626">the restart ⟲</text>

  <text x="90" y="320" class="lab">The "Y" (youth) scale · 1Y → 7Y</text>
  <rect x="90" y="336" width="640" height="58" rx="12" fill="url(#y)"/>
  <text x="120" y="373" class="seg">1Y</text>
  <text x="410" y="373" text-anchor="middle" class="seg">foot 19.7 → 25.0 cm</text>
  <text x="700" y="373" text-anchor="end" class="seg">7Y</text>
  <text x="90" y="420" class="age">≈ 7–8 yr · one step ABOVE 13.5C</text>
  <text x="700" y="420" text-anchor="end" class="age">≈ 13+ yr · overlaps women's ~8.5</text>

  <!-- side note -->
  <rect x="800" y="300" width="330" height="130" rx="16" fill="#eef9ff" stroke="#8ed9ff" stroke-width="2"/>
  <text x="965" y="336" text-anchor="middle" class="lab" fill="#153056">Budget trick</text>
  <text x="965" y="366" text-anchor="middle" class="sub">women's US ≈ youth + 1.5</text>
  <text x="965" y="392" text-anchor="middle" class="sub">a 5Y sneaker fits a women's 6.5</text>
  <text x="965" y="418" text-anchor="middle" class="sub">— usually at the kids' price</text>

  <!-- footer -->
  <rect x="180" y="470" width="840" height="52" rx="12" fill="#153056"/>
  <text x="600" y="504" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="22" font-weight="600" fill="#7ef0c0">measure the foot in cm + add 0.8 cm growing room — ages are averages</text>
  <text x="600" y="576" text-anchor="middle" class="sub">UK kids' sizes run one below US · EU sizes count straight up the adult scale · re-measure every 2–3 months under age 4</text>
</svg>
