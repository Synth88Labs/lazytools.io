<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-label="Entropy comparison of three passwords: an 8-character complex password reaches about 52 bits, a 16-character lowercase password about 75 bits, and a 16-character full-alphabet password about 105 bits; each extra bit doubles attacker work">
  <defs>
    <style>
      .h { font: 800 30px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .lab { font: 700 20px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .sub { font: 500 17px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .pw { font: 700 21px Consolas, Menlo, monospace; fill: #0f172a; }
      .bits { font: 800 22px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; }
      .verdict { font: 800 17px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
    </style>
  </defs>

  <text x="600" y="46" text-anchor="middle" class="h">Password entropy: length is the lever</text>
  <text x="600" y="78" text-anchor="middle" class="sub">entropy = length × log₂(alphabet size) — every bit doubles the attacker's work</text>

  <!-- bars: bits scale, x = 320 + bits * 7, max ~105 bits → 735px wide -->
  <!-- row 1: 8-char complex, 52 bits -->
  <g transform="translate(0 120)">
    <text x="300" y="28" text-anchor="end" class="pw">Xk4$p!9Q</text>
    <text x="300" y="52" text-anchor="end" class="sub">8 chars · all 94 symbols</text>
    <rect x="320" y="8" width="364" height="44" rx="10" fill="#f87171"/>
    <text x="700" y="38" class="bits" fill="#b91c1c">≈ 52 bits</text>
    <rect x="830" y="12" width="180" height="36" rx="18" fill="#dc2626"/>
    <text x="920" y="36" text-anchor="middle" class="verdict">✗ crackable offline</text>
  </g>

  <!-- row 2: 16-char lowercase, 75 bits -->
  <g transform="translate(0 230)">
    <text x="300" y="28" text-anchor="end" class="pw">wmvqtherkzcoyubl</text>
    <text x="300" y="52" text-anchor="end" class="sub">16 chars · lowercase only</text>
    <rect x="320" y="8" width="525" height="44" rx="10" fill="#fbbf24"/>
    <text x="860" y="38" class="bits" fill="#b45309">≈ 75 bits</text>
    <rect x="975" y="12" width="120" height="36" rx="18" fill="#059669"/>
    <text x="1035" y="36" text-anchor="middle" class="verdict">✓ strong</text>
  </g>

  <!-- row 3: 16-char full, 105 bits -->
  <g transform="translate(0 340)">
    <text x="300" y="28" text-anchor="end" class="pw">t7#Kp2!vQ9&amp;xW4$e</text>
    <text x="300" y="52" text-anchor="end" class="sub">16 chars · all 94 symbols</text>
    <rect x="320" y="8" width="735" height="44" rx="10" fill="#34d399"/>
    <text x="690" y="38" class="bits" fill="#065f46">≈ 105 bits — excellent</text>
  </g>

  <!-- comparison callout -->
  <rect x="140" y="460" width="920" height="60" rx="14" fill="#eef9ff" stroke="#94a3b8" stroke-width="2"/>
  <text x="600" y="497" text-anchor="middle" class="lab">75 − 52 = 23 bits → the 16-char lowercase password is 2²³ ≈ 8,000,000× harder to crack</text>

  <rect x="240" y="548" width="720" height="48" rx="12" fill="#153056"/>
  <text x="600" y="579" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="20" font-weight="600" fill="#7ef0c0">+1 character always beats +1 symbol rule</text>
</svg>
