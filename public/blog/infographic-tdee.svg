<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="How TDEE is built from BMR: BMR is the calories your body burns at complete rest, calculated with the Mifflin–St Jeor equation, 10 times weight in kg plus 6.25 times height in cm minus 5 times age, plus 5 for men or minus 161 for women. TDEE is BMR multiplied by an activity factor: sedentary 1.2, light 1.375, moderate 1.55, active 1.725, very active 1.9. A worked example: a 30-year-old man, 75 kg, 175 cm, has a BMR of about 1699 and at the moderate factor a TDEE of about 2633 calories per day. To lose weight subtract about 500 calories per day for half a kilogram per week; to gain, add 500. A pound of fat is roughly 3500 calories.">
  <defs>
    <style>
      .h { font: 800 30px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#0f172a; }
      .lab { font: 700 19px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#334155; }
      .sub { font: 500 15px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#64748b; }
      .big { font: 800 20px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; }
      .mono { font: 700 17px Consolas,Menlo,monospace; }
      .monoBig { font: 800 34px Consolas,Menlo,monospace; }
    </style>
  </defs>

  <text x="600" y="42" text-anchor="middle" class="h">🍎 TDEE is your BMR times how much you move</text>

  <!-- BMR box -->
  <g transform="translate(90 74)">
    <rect x="0" y="0" width="440" height="150" rx="14" fill="#eef9ff" stroke="#1d87f1" stroke-width="2"/>
    <text x="220" y="34" text-anchor="middle" class="big" fill="#1e3a8a">BMR — burned at complete rest</text>
    <text x="220" y="72" text-anchor="middle" class="mono" fill="#0f172a">10×kg + 6.25×cm − 5×age</text>
    <text x="220" y="98" text-anchor="middle" class="mono" fill="#0f172a">+ 5 (men) / − 161 (women)</text>
    <text x="220" y="130" text-anchor="middle" class="sub">Mifflin–St Jeor — the most accurate common formula</text>
  </g>

  <text x="560" y="158" text-anchor="middle" class="monoBig" fill="#334155">×</text>

  <!-- activity factors -->
  <g transform="translate(600 74)">
    <rect x="0" y="0" width="510" height="150" rx="14" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
    <text x="255" y="34" text-anchor="middle" class="big" fill="#065f46">Activity factor</text>
    <text x="255" y="66" text-anchor="middle" class="sub" fill="#065f46">Sedentary 1.2 · Light 1.375 · Moderate 1.55</text>
    <text x="255" y="90" text-anchor="middle" class="sub" fill="#065f46">Active 1.725 · Very active 1.9</text>
    <text x="255" y="128" text-anchor="middle" class="sub">be honest — most people overestimate this</text>
  </g>

  <!-- worked example -->
  <text x="600" y="272" text-anchor="middle" class="lab">Worked example — man, 30 yr, 75 kg, 175 cm</text>
  <g transform="translate(180 292)">
    <rect x="0" y="0" width="240" height="86" rx="12" fill="#dbeafe"/>
    <text x="120" y="40" text-anchor="middle" class="monoBig" fill="#1e3a8a">1699</text>
    <text x="120" y="66" text-anchor="middle" class="sub" fill="#1e3a8a">BMR (kcal/day)</text>
  </g>
  <text x="452" y="345" text-anchor="middle" class="monoBig" fill="#334155">×</text>
  <g transform="translate(490 292)">
    <rect x="0" y="0" width="220" height="86" rx="12" fill="#dcfce7"/>
    <text x="110" y="40" text-anchor="middle" class="monoBig" fill="#065f46">1.55</text>
    <text x="110" y="66" text-anchor="middle" class="sub" fill="#065f46">moderate</text>
  </g>
  <text x="742" y="345" text-anchor="middle" class="monoBig" fill="#334155">=</text>
  <g transform="translate(780 292)">
    <rect x="0" y="0" width="240" height="86" rx="12" fill="#0f172a"/>
    <text x="120" y="40" text-anchor="middle" class="monoBig" fill="#7ef0c0">2633</text>
    <text x="120" y="66" text-anchor="middle" class="sub" fill="#94a3b8">TDEE — maintenance</text>
  </g>

  <!-- goals -->
  <text x="600" y="430" text-anchor="middle" class="lab">Then adjust for your goal (≈ 3500 kcal = 1 lb of fat)</text>
  <g transform="translate(150 450)">
    <rect x="0" y="0" width="290" height="80" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="145" y="34" text-anchor="middle" class="big" fill="#991b1b">− 500 / day</text>
    <text x="145" y="60" text-anchor="middle" class="sub" fill="#991b1b">lose ≈ 0.5 kg / 1 lb per week</text>
  </g>
  <g transform="translate(455 450)">
    <rect x="0" y="0" width="290" height="80" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <text x="145" y="34" text-anchor="middle" class="big" fill="#0f172a">maintain</text>
    <text x="145" y="60" text-anchor="middle" class="sub">eat at your TDEE</text>
  </g>
  <g transform="translate(760 450)">
    <rect x="0" y="0" width="290" height="80" rx="12" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
    <text x="145" y="34" text-anchor="middle" class="big" fill="#065f46">+ 500 / day</text>
    <text x="145" y="60" text-anchor="middle" class="sub" fill="#065f46">gain ≈ 0.5 kg / 1 lb per week</text>
  </g>

  <rect x="200" y="556" width="800" height="44" rx="12" fill="#153056"/>
  <text x="600" y="583" text-anchor="middle" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#ffffff">These are estimates, not medical advice — real needs vary ±10–15% by body composition and genetics.</text>
</svg>
