<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="The significant figures rules: non-zero digits always count; zeros between non-zero digits count; leading zeros never count, they only place the decimal point; trailing zeros count only when there is a decimal point, and in a bare integer they are ambiguous. Examples: 0.004560 has four significant figures, 105 has three, 100.0 has four, and 1200 is ambiguous. Write it in scientific notation to be explicit.">
  <defs>
    <style>
      .h { font: 800 30px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#0f172a; }
      .lab { font: 700 19px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#334155; }
      .sub { font: 500 15px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#64748b; }
      .big { font: 800 18px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; }
      .digit { font: 800 26px Consolas,Menlo,monospace; }
    </style>
  </defs>

  <text x="600" y="42" text-anchor="middle" class="h">🎯 Which digits are significant?</text>

  <!-- four rules -->
  <g transform="translate(75 70)">
    <rect x="0" y="0" width="510" height="92" rx="12" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
    <text x="20" y="32" class="big" fill="#065f46">Non-zero digits — ALWAYS count</text>
    <text x="20" y="62" class="sub">1–9 are always significant.</text>
    <text x="20" y="82" class="sub">42 → 2 sig figs · 3.7 → 2 sig figs</text>
  </g>
  <g transform="translate(615 70)">
    <rect x="0" y="0" width="510" height="92" rx="12" fill="#eef9ff" stroke="#1d87f1" stroke-width="2"/>
    <text x="20" y="32" class="big" fill="#1e3a8a">Zeros BETWEEN non-zeros — count</text>
    <text x="20" y="62" class="sub">"trapped" zeros are significant.</text>
    <text x="20" y="82" class="sub">105 → 3 · 4008 → 4</text>
  </g>
  <g transform="translate(75 172)">
    <rect x="0" y="0" width="510" height="92" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
    <text x="20" y="32" class="big" fill="#475569">Leading zeros — NEVER count</text>
    <text x="20" y="62" class="sub">they only place the decimal point.</text>
    <text x="20" y="82" class="sub">0.0056 → 2 · 0.004560 → 4</text>
  </g>
  <g transform="translate(615 172)">
    <rect x="0" y="0" width="510" height="92" rx="12" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
    <text x="20" y="32" class="big" fill="#92400e">Trailing zeros — only with a point</text>
    <text x="20" y="62" class="sub">100.0 → 4 (has a point)</text>
    <text x="20" y="82" class="sub">1200 → ambiguous (bare integer)</text>
  </g>

  <!-- worked example -->
  <text x="600" y="312" text-anchor="middle" class="lab">Reading 0.004560 digit by digit</text>
  <g transform="translate(360 336)">
    <g transform="translate(0 0)"><rect x="0" y="0" width="52" height="52" rx="8" fill="#f1f5f9"/><text x="26" y="35" text-anchor="middle" class="digit" fill="#94a3b8">0</text></g>
    <g transform="translate(60 0)"><rect x="0" y="0" width="18" height="52" rx="4" fill="#ffffff"/><text x="9" y="35" text-anchor="middle" class="digit" fill="#334155">.</text></g>
    <g transform="translate(86 0)"><rect x="0" y="0" width="52" height="52" rx="8" fill="#f1f5f9"/><text x="26" y="35" text-anchor="middle" class="digit" fill="#94a3b8">0</text></g>
    <g transform="translate(146 0)"><rect x="0" y="0" width="52" height="52" rx="8" fill="#f1f5f9"/><text x="26" y="35" text-anchor="middle" class="digit" fill="#94a3b8">0</text></g>
    <g transform="translate(206 0)"><rect x="0" y="0" width="52" height="52" rx="8" fill="#dcfce7"/><text x="26" y="35" text-anchor="middle" class="digit" fill="#166534">4</text></g>
    <g transform="translate(266 0)"><rect x="0" y="0" width="52" height="52" rx="8" fill="#dcfce7"/><text x="26" y="35" text-anchor="middle" class="digit" fill="#166534">5</text></g>
    <g transform="translate(326 0)"><rect x="0" y="0" width="52" height="52" rx="8" fill="#dcfce7"/><text x="26" y="35" text-anchor="middle" class="digit" fill="#166534">6</text></g>
    <g transform="translate(386 0)"><rect x="0" y="0" width="52" height="52" rx="8" fill="#dcfce7"/><text x="26" y="35" text-anchor="middle" class="digit" fill="#166534">0</text></g>
    <text x="243" y="86" text-anchor="middle" class="sub" fill="#94a3b8">leading zeros: don't count</text>
    <text x="299" y="106" text-anchor="middle" class="sub" fill="#166534">these 4 count (trailing 0 after the point IS significant)</text>
  </g>

  <rect x="200" y="470" width="800" height="120" rx="14" fill="#153056"/>
  <text x="600" y="506" text-anchor="middle" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-size="18" font-weight="800" fill="#ffffff">The ambiguous case: 1200</text>
  <text x="600" y="536" text-anchor="middle" class="sub" fill="#cbd5e1">Two sig figs? Four? A bare integer doesn't say whether the zeros were measured.</text>
  <text x="600" y="566" text-anchor="middle" font-family="Consolas,Menlo,monospace" font-size="15" font-weight="700" fill="#7ef0c0">1.2 × 10³ = 2 sig figs   ·   1.200 × 10³ = 4 sig figs</text>
</svg>
