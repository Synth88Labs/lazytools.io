<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="A comparison of lunar, solar and lunisolar calendars: a lunar Islamic year of about 354 days that drifts earlier against the seasons, a solar Gregorian and Persian year of about 365 days fixed to the seasons, and a lunisolar Hebrew year that adds a leap month to realign. Alongside, the year number in each system in mid-2026: Gregorian 2026, Islamic 1448, Persian 1405, Hebrew 5786, Buddhist 2569, Minguo 115 — showing each counts from a different epoch.">
  <defs>
    <style>
      .h { font: 800 30px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .lab { font: 700 19px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .sub { font: 500 15px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .type { font: 800 20px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; }
      .yr { font: 800 26px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; }
      .cal { font: 600 15px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <text x="600" y="42" text-anchor="middle" class="h">Three ways to measure a year</text>

  <!-- three type cards -->
  <g transform="translate(60 72)">
    <rect x="0" y="0" width="345" height="180" rx="14" fill="#eef9ff" stroke="#1d87f1" stroke-width="2"/>
    <text x="172" y="40" text-anchor="middle" class="type" fill="#153056">🌙 Lunar</text>
    <text x="172" y="72" text-anchor="middle" class="sub">follows the moon · ~354 days</text>
    <text x="172" y="100" text-anchor="middle" class="cal">Islamic (Hijri)</text>
    <text x="172" y="140" text-anchor="middle" class="sub">drifts ~11 days earlier each year —</text>
    <text x="172" y="160" text-anchor="middle" class="sub">Ramadan moves through the seasons</text>
  </g>
  <g transform="translate(427 72)">
    <rect x="0" y="0" width="345" height="180" rx="14" fill="#fefce8" stroke="#b45309" stroke-width="2"/>
    <text x="172" y="40" text-anchor="middle" class="type" fill="#92400e">☀️ Solar</text>
    <text x="172" y="72" text-anchor="middle" class="sub">follows the sun · ~365 days</text>
    <text x="172" y="100" text-anchor="middle" class="cal">Gregorian · Persian</text>
    <text x="172" y="140" text-anchor="middle" class="sub">seasons stay fixed · leap DAYS</text>
    <text x="172" y="160" text-anchor="middle" class="sub">absorb the stray quarter-day</text>
  </g>
  <g transform="translate(794 72)">
    <rect x="0" y="0" width="346" height="180" rx="14" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
    <text x="173" y="40" text-anchor="middle" class="type" fill="#065f46">🌗 Lunisolar</text>
    <text x="173" y="72" text-anchor="middle" class="sub">moon months + a leap MONTH</text>
    <text x="173" y="100" text-anchor="middle" class="cal">Hebrew · Chinese</text>
    <text x="173" y="140" text-anchor="middle" class="sub">adds a 13th month periodically</text>
    <text x="173" y="160" text-anchor="middle" class="sub">to stay aligned with the sun</text>
  </g>

  <!-- year numbers strip -->
  <text x="600" y="300" text-anchor="middle" class="lab">The same day, mid-2026 — five different year numbers (different epochs)</text>
  <g transform="translate(60 320)">
    <!-- 6 chips across 1080 width -->
    <g transform="translate(0 0)"><rect x="0" y="0" width="160" height="90" rx="12" fill="#153056"/><text x="80" y="38" text-anchor="middle" class="yr" fill="#ffffff">2026</text><text x="80" y="64" text-anchor="middle" class="sub" fill="#9fb4d1">Gregorian</text><text x="80" y="82" text-anchor="middle" class="sub" fill="#7ea0c8">from 1 CE</text></g>
    <g transform="translate(184 0)"><rect x="0" y="0" width="160" height="90" rx="12" fill="#1d87f1"/><text x="80" y="38" text-anchor="middle" class="yr" fill="#ffffff">1448</text><text x="80" y="64" text-anchor="middle" class="sub" fill="#dbeafe">Islamic AH</text><text x="80" y="82" text-anchor="middle" class="sub" fill="#c3ddfb">from 622</text></g>
    <g transform="translate(368 0)"><rect x="0" y="0" width="160" height="90" rx="12" fill="#b45309"/><text x="80" y="38" text-anchor="middle" class="yr" fill="#ffffff">1405</text><text x="80" y="64" text-anchor="middle" class="sub" fill="#fde9c8">Persian AP</text><text x="80" y="82" text-anchor="middle" class="sub" fill="#f6d9a8">from 622</text></g>
    <g transform="translate(552 0)"><rect x="0" y="0" width="160" height="90" rx="12" fill="#059669"/><text x="80" y="38" text-anchor="middle" class="yr" fill="#ffffff">5786</text><text x="80" y="64" text-anchor="middle" class="sub" fill="#d1fae5">Hebrew AM</text><text x="80" y="82" text-anchor="middle" class="sub" fill="#b6f0d3">from creation</text></g>
    <g transform="translate(736 0)"><rect x="0" y="0" width="160" height="90" rx="12" fill="#7c3aed"/><text x="80" y="38" text-anchor="middle" class="yr" fill="#ffffff">2569</text><text x="80" y="64" text-anchor="middle" class="sub" fill="#e9d5ff">Buddhist BE</text><text x="80" y="82" text-anchor="middle" class="sub" fill="#dcc3fb">from 543 BCE</text></g>
    <g transform="translate(920 0)"><rect x="0" y="0" width="160" height="90" rx="12" fill="#0f766e"/><text x="80" y="38" text-anchor="middle" class="yr" fill="#ffffff">115</text><text x="80" y="64" text-anchor="middle" class="sub" fill="#ccfbf1">Minguo</text><text x="80" y="82" text-anchor="middle" class="sub" fill="#a7f3ec">from 1912</text></g>
  </g>

  <!-- julian note -->
  <g transform="translate(60 440)">
    <rect x="0" y="0" width="1080" height="70" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="24" y="30" class="lab" fill="#991b1b">📜 Julian vs Gregorian: 13 days apart today</text>
    <text x="24" y="56" class="sub">the 1582 reform skipped 10 days (Thu 4 Oct → Fri 15 Oct) and added the "divisible by 400" century rule</text>
  </g>

  <rect x="230" y="536" width="740" height="52" rx="12" fill="#153056"/>
  <text x="600" y="562" text-anchor="middle" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="#ffffff">Two axes of difference: what each counts FROM, and how it MEASURES the year</text>
  <text x="600" y="582" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="15" font-weight="600" fill="#7ef0c0">convert any date across all of them — in your browser</text>
</svg>
