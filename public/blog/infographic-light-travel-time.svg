<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="How long light takes to reach Earth from objects in space, so how far in the past we see them. The Moon: 1.3 seconds ago. The Sun: 8 minutes 20 seconds ago. Mars at closest: about 3 minutes; on average about 12 minutes. Jupiter: about 43 minutes. Neptune: about 4 hours. Proxima Centauri, the nearest star: 4.24 years ago. The Andromeda galaxy: 2.5 million years ago. Light travels at 299,792 kilometres per second, but space is so vast that we always see the past.">
  <defs>
    <style>
      .h { font: 800 28px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .sub { font: 500 15px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .obj { font: 700 17px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .time { font: 800 17px Consolas, Menlo, monospace; fill: #7ef0c0; }
      .em { font: 20px 'Segoe UI Emoji', sans-serif; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="640" fill="#0b1026"/>
  <!-- stars -->
  <g fill="#ffffff" opacity="0.5">
    <circle cx="120" cy="90" r="1.4"/><circle cx="360" cy="60" r="1"/><circle cx="640" cy="100" r="1.6"/><circle cx="900" cy="70" r="1.1"/><circle cx="1080" cy="120" r="1.3"/>
    <circle cx="220" cy="560" r="1.2"/><circle cx="500" cy="590" r="1"/><circle cx="820" cy="560" r="1.4"/><circle cx="1020" cy="590" r="1"/><circle cx="60" cy="300" r="1"/>
  </g>

  <text x="600" y="44" text-anchor="middle" class="h" fill="#f8fafc">You always see space in the past</text>
  <text x="600" y="70" text-anchor="middle" class="sub">light takes time to arrive — so this is how long ago the light you see left</text>

  <!-- rows -->
  <g>
    <g transform="translate(0 110)"><text x="120" y="24" class="em">🌙</text><text x="170" y="24" class="obj">The Moon</text><text x="1080" y="24" text-anchor="end" class="time">1.3 seconds ago</text><line x1="120" y1="40" x2="1080" y2="40" stroke="#1e293b"/></g>
    <g transform="translate(0 160)"><text x="120" y="24" class="em">☀️</text><text x="170" y="24" class="obj">The Sun</text><text x="1080" y="24" text-anchor="end" class="time">8 min 20 sec ago</text><line x1="120" y1="40" x2="1080" y2="40" stroke="#1e293b"/></g>
    <g transform="translate(0 210)"><text x="120" y="24" class="em">🔴</text><text x="170" y="24" class="obj">Mars (average)</text><text x="1080" y="24" text-anchor="end" class="time">~12 minutes ago</text><line x1="120" y1="40" x2="1080" y2="40" stroke="#1e293b"/></g>
    <g transform="translate(0 260)"><text x="120" y="24" class="em">🪐</text><text x="170" y="24" class="obj">Jupiter</text><text x="1080" y="24" text-anchor="end" class="time">~43 minutes ago</text><line x1="120" y1="40" x2="1080" y2="40" stroke="#1e293b"/></g>
    <g transform="translate(0 310)"><text x="120" y="24" class="em">🔵</text><text x="170" y="24" class="obj">Neptune</text><text x="1080" y="24" text-anchor="end" class="time">~4 hours ago</text><line x1="120" y1="40" x2="1080" y2="40" stroke="#1e293b"/></g>
    <g transform="translate(0 360)"><text x="120" y="24" class="em">⭐</text><text x="170" y="24" class="obj">Proxima Centauri (nearest star)</text><text x="1080" y="24" text-anchor="end" class="time">4.24 years ago</text><line x1="120" y1="40" x2="1080" y2="40" stroke="#1e293b"/></g>
    <g transform="translate(0 410)"><text x="120" y="24" class="em">🌌</text><text x="170" y="24" class="obj">Andromeda galaxy</text><text x="1080" y="24" text-anchor="end" class="time">2.5 million years ago</text></g>
  </g>

  <!-- footer -->
  <g transform="translate(120 470)">
    <rect x="0" y="0" width="960" height="52" rx="14" fill="#132044"/>
    <text x="24" y="32" font-family="Consolas, Menlo, monospace" font-size="14" fill="#7ef0c0">light = 299,792 km/s — lazytools.io light-travel-time & distance calculator</text>
  </g>
</svg>
