<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="How chmod numbers work: each of owner, group and others gets three permission bits — read equals 4, write equals 2, execute equals 1 — and the chmod digit is their sum. So 7 is read plus write plus execute (rwx), 5 is read plus execute (r-x), 4 is read only. chmod 755 means rwxr-xr-x: full control for the owner, read and execute for everyone else. Common values: 644 for files, 755 for directories and programs, 600 for private files. chmod 777 makes a file world-writable and is almost always the wrong fix.">
  <defs>
    <style>
      .h { font: 800 30px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#0f172a; }
      .lab { font: 700 19px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#334155; }
      .sub { font: 500 15px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#64748b; }
      .big { font: 800 20px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; }
      .mono { font: 700 18px Consolas,Menlo,monospace; }
      .monoBig { font: 800 40px Consolas,Menlo,monospace; }
    </style>
  </defs>

  <text x="600" y="42" text-anchor="middle" class="h">🔑 chmod numbers are just read + write + execute</text>

  <!-- bit values -->
  <g transform="translate(180 66)">
    <rect x="0" y="0" width="260" height="70" rx="12" fill="#eef9ff" stroke="#1d87f1" stroke-width="2"/>
    <text x="130" y="30" text-anchor="middle" class="big" fill="#1e3a8a">read = 4</text>
    <text x="130" y="56" text-anchor="middle" class="sub">r</text>
  </g>
  <g transform="translate(470 66)">
    <rect x="0" y="0" width="260" height="70" rx="12" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
    <text x="130" y="30" text-anchor="middle" class="big" fill="#065f46">write = 2</text>
    <text x="130" y="56" text-anchor="middle" class="sub">w</text>
  </g>
  <g transform="translate(760 66)">
    <rect x="0" y="0" width="260" height="70" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="130" y="30" text-anchor="middle" class="big" fill="#5b21b6">execute = 1</text>
    <text x="130" y="56" text-anchor="middle" class="sub">x</text>
  </g>
  <text x="600" y="168" text-anchor="middle" class="sub">each digit is the sum: 7 = 4+2+1 (rwx) · 5 = 4+1 (r-x) · 6 = 4+2 (rw-) · 4 = r-- · 0 = ---</text>

  <!-- 755 breakdown -->
  <g transform="translate(150 196)">
    <text x="0" y="50" class="monoBig" fill="#0f172a">chmod</text>
    <g transform="translate(200 0)">
      <rect x="0" y="0" width="90" height="150" rx="12" fill="#dbeafe"/>
      <text x="45" y="52" text-anchor="middle" class="monoBig" fill="#1e3a8a">7</text>
      <text x="45" y="90" text-anchor="middle" class="mono" fill="#1e3a8a">rwx</text>
      <text x="45" y="120" text-anchor="middle" class="sub" fill="#1e3a8a">Owner</text>
      <text x="45" y="140" text-anchor="middle" class="sub" fill="#1e3a8a">4+2+1</text>
    </g>
    <g transform="translate(300 0)">
      <rect x="0" y="0" width="90" height="150" rx="12" fill="#dcfce7"/>
      <text x="45" y="52" text-anchor="middle" class="monoBig" fill="#065f46">5</text>
      <text x="45" y="90" text-anchor="middle" class="mono" fill="#065f46">r-x</text>
      <text x="45" y="120" text-anchor="middle" class="sub" fill="#065f46">Group</text>
      <text x="45" y="140" text-anchor="middle" class="sub" fill="#065f46">4+1</text>
    </g>
    <g transform="translate(400 0)">
      <rect x="0" y="0" width="90" height="150" rx="12" fill="#f3e8ff"/>
      <text x="45" y="52" text-anchor="middle" class="monoBig" fill="#5b21b6">5</text>
      <text x="45" y="90" text-anchor="middle" class="mono" fill="#5b21b6">r-x</text>
      <text x="45" y="120" text-anchor="middle" class="sub" fill="#5b21b6">Others</text>
      <text x="45" y="140" text-anchor="middle" class="sub" fill="#5b21b6">4+1</text>
    </g>
    <text x="520" y="66" class="mono" fill="#334155">→</text>
    <g transform="translate(560 30)">
      <rect x="0" y="0" width="290" height="90" rx="12" fill="#0f172a"/>
      <text x="145" y="42" text-anchor="middle" class="mono" fill="#7ef0c0">-rwxr-xr-x</text>
      <text x="145" y="70" text-anchor="middle" class="sub" fill="#94a3b8">what ls -l shows</text>
    </g>
  </g>

  <!-- presets -->
  <text x="600" y="400" text-anchor="middle" class="lab">The values you'll actually type</text>
  <g transform="translate(110 420)">
    <rect x="0" y="0" width="230" height="70" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/><text x="115" y="32" text-anchor="middle" class="mono" fill="#0f172a">644</text><text x="115" y="56" text-anchor="middle" class="sub">regular files</text></g>
  <g transform="translate(360 420)">
    <rect x="0" y="0" width="230" height="70" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/><text x="115" y="32" text-anchor="middle" class="mono" fill="#0f172a">755</text><text x="115" y="56" text-anchor="middle" class="sub">directories &amp; programs</text></g>
  <g transform="translate(610 420)">
    <rect x="0" y="0" width="230" height="70" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/><text x="115" y="32" text-anchor="middle" class="mono" fill="#0f172a">600</text><text x="115" y="56" text-anchor="middle" class="sub">private (ssh keys)</text></g>
  <g transform="translate(860 420)">
    <rect x="0" y="0" width="230" height="70" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/><text x="115" y="32" text-anchor="middle" class="mono" fill="#991b1b">777</text><text x="115" y="56" text-anchor="middle" class="sub" fill="#991b1b">world-writable — avoid</text></g>

  <rect x="200" y="530" width="800" height="58" rx="12" fill="#153056"/>
  <text x="600" y="556" text-anchor="middle" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#ffffff">On a directory, execute means "can enter it" — not "can run it".</text>
  <text x="600" y="578" text-anchor="middle" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#7ef0c0">"Only works with 777" almost always means the real problem is ownership — use chown.</text>
</svg>
