<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-label="The three forms of every percentage problem: find the part, find the percent, find the whole — plus the swap trick">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef9ff"/>
      <stop offset="1" stop-color="#d9f1ff"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2fc98e"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <style>
      .h { font: 800 30px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .q { font: 700 23px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #153056; }
      .f { font: 600 20px Consolas, Menlo, monospace; fill: #475569; }
      .a { font: 800 34px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #059669; }
      .tag { font: 700 16px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #ffffff; letter-spacing: 2px; }
    </style>
  </defs>

  <text x="600" y="46" text-anchor="middle" class="h">Every percentage problem is one of these three</text>

  <!-- Card 1 -->
  <rect x="60" y="90" width="340" height="300" rx="20" fill="url(#card)" stroke="#8ed9ff" stroke-width="2"/>
  <rect x="60" y="90" width="340" height="46" rx="20" fill="#1d87f1"/>
  <rect x="60" y="116" width="340" height="20" fill="#1d87f1"/>
  <text x="230" y="120" text-anchor="middle" class="tag">FORM 1 · FIND THE PART</text>
  <text x="230" y="185" text-anchor="middle" class="q">What is 15% of 80?</text>
  <text x="230" y="240" text-anchor="middle" class="f">part = 80 × 0.15</text>
  <text x="230" y="310" text-anchor="middle" class="a">= 12</text>

  <!-- Card 2 -->
  <rect x="430" y="90" width="340" height="300" rx="20" fill="url(#card)" stroke="#8ed9ff" stroke-width="2"/>
  <rect x="430" y="90" width="340" height="46" rx="20" fill="#1d87f1"/>
  <rect x="430" y="116" width="340" height="20" fill="#1d87f1"/>
  <text x="600" y="120" text-anchor="middle" class="tag">FORM 2 · FIND THE PERCENT</text>
  <text x="600" y="185" text-anchor="middle" class="q">12 is what % of 80?</text>
  <text x="600" y="240" text-anchor="middle" class="f">% = 12 ÷ 80 × 100</text>
  <text x="600" y="310" text-anchor="middle" class="a">= 15%</text>

  <!-- Card 3 -->
  <rect x="800" y="90" width="340" height="300" rx="20" fill="url(#card)" stroke="#8ed9ff" stroke-width="2"/>
  <rect x="800" y="90" width="340" height="46" rx="20" fill="#1d87f1"/>
  <rect x="800" y="116" width="340" height="20" fill="#1d87f1"/>
  <text x="970" y="120" text-anchor="middle" class="tag">FORM 3 · FIND THE WHOLE</text>
  <text x="970" y="185" text-anchor="middle" class="q">12 is 15% of what?</text>
  <text x="970" y="240" text-anchor="middle" class="f">whole = 12 ÷ 0.15</text>
  <text x="970" y="310" text-anchor="middle" class="a">= 80</text>

  <!-- swap trick strip -->
  <rect x="150" y="430" width="900" height="120" rx="20" fill="#153056"/>
  <text x="600" y="478" text-anchor="middle" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-size="24" font-weight="800" fill="#ffffff">The swap trick: X% of Y = Y% of X — always</text>
  <text x="600" y="522" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="23" font-weight="600" fill="#7ef0c0">8% of 50  ⇄  50% of 8  =  4</text>

  <text x="600" y="596" text-anchor="middle" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-size="18" fill="#64748b">Form 3 is the "reverse percentage": original price = paid ÷ fraction kept</text>
</svg>
