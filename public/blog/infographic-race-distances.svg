<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-label="Race distances to scale: 5K is 3.11 miles, 10K is 6.21, half marathon 13.11, marathon 26.22 miles">
  <defs>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3fa9fd"/>
      <stop offset="1" stop-color="#1465cf"/>
    </linearGradient>
    <linearGradient id="barm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2fc98e"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <style>
      .h { font: 800 30px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .race { font: 700 23px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .val { font: 700 20px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #166fde; }
      .inbar { font: 700 20px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
    </style>
  </defs>

  <text x="600" y="46" text-anchor="middle" class="h">Race distances, drawn to scale</text>

  <!-- scale: 42.195 km = 1020 px → 24.174 px/km ; bars start x=130 -->
  <!-- 5K -->
  <text x="130" y="112" class="race">5K</text>
  <rect x="130" y="124" width="121" height="44" rx="10" fill="url(#bar)"/>
  <text x="265" y="153" class="val">3.11 mi · 12.5 track laps</text>

  <!-- 10K -->
  <text x="130" y="222" class="race">10K</text>
  <rect x="130" y="234" width="242" height="44" rx="10" fill="url(#bar)"/>
  <text x="386" y="263" class="val">6.21 mi</text>

  <!-- Half -->
  <text x="130" y="332" class="race">Half marathon · 21.0975 km</text>
  <rect x="130" y="344" width="510" height="44" rx="10" fill="url(#bar)"/>
  <text x="654" y="373" class="val">13.11 mi</text>

  <!-- Marathon -->
  <text x="130" y="442" class="race">Marathon · 42.195 km</text>
  <rect x="130" y="454" width="1020" height="44" rx="10" fill="url(#barm)"/>
  <text x="640" y="483" text-anchor="middle" class="inbar">26.22 mi — Windsor Castle → the royal box, 1908</text>

  <!-- footer chip -->
  <rect x="240" y="546" width="720" height="50" rx="12" fill="#153056"/>
  <text x="600" y="579" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="23" font-weight="600" fill="#7ef0c0">1 km = 0.621371 mi  ·  1 mi = 1.609344 km</text>
</svg>
