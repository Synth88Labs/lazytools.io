<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="A diagram of one octave of musical notes from C4 to C5 with their frequencies in equal temperament, A4 = 440 Hz. Each of the twelve semitone steps multiplies the frequency by the twelfth root of two, about 1.0595. C4 is 261.63 Hz, E4 329.63, G4 392.00, A4 440, and C5 523.25 — exactly double C4. Twelve equal steps make an octave, and each octave doubles the frequency.">
  <defs>
    <style>
      .h { font: 800 28px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .sub { font: 500 15px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .note { font: 800 15px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; }
      .freq { font: 600 12px Consolas, Menlo, monospace; fill: #475569; }
      .lab { font: 700 14px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #1d4ed8; }
    </style>
  </defs>

  <text x="600" y="40" text-anchor="middle" class="h">One octave, twelve equal steps</text>
  <text x="600" y="66" text-anchor="middle" class="sub">each semitone × 2^(1/12) ≈ 1.0595 · each octave doubles the frequency</text>

  <!-- 13 bars C4..C5, heights grow with frequency (log-ish). x from 90..1110 -->
  <!-- notes and freqs -->
  <g>
    <!-- bar helper: 13 notes -->
    <!-- C4 261.63 -->
    <g transform="translate(90 0)"><rect x="0" y="360" width="58" height="120" rx="5" fill="#93c5fd"/><text x="29" y="500" text-anchor="middle" class="note" fill="#1d4ed8">C4</text><text x="29" y="518" text-anchor="middle" class="freq">261.6</text></g>
    <g transform="translate(168 0)"><rect x="0" y="345" width="58" height="135" rx="5" fill="#93c5fd"/><text x="29" y="500" text-anchor="middle" class="note" fill="#334155">C♯</text><text x="29" y="518" text-anchor="middle" class="freq">277.2</text></g>
    <g transform="translate(246 0)"><rect x="0" y="330" width="58" height="150" rx="5" fill="#93c5fd"/><text x="29" y="500" text-anchor="middle" class="note" fill="#334155">D</text><text x="29" y="518" text-anchor="middle" class="freq">293.7</text></g>
    <g transform="translate(324 0)"><rect x="0" y="314" width="58" height="166" rx="5" fill="#93c5fd"/><text x="29" y="500" text-anchor="middle" class="note" fill="#334155">D♯</text><text x="29" y="518" text-anchor="middle" class="freq">311.1</text></g>
    <g transform="translate(402 0)"><rect x="0" y="298" width="58" height="182" rx="5" fill="#60a5fa"/><text x="29" y="500" text-anchor="middle" class="note" fill="#1d4ed8">E</text><text x="29" y="518" text-anchor="middle" class="freq">329.6</text></g>
    <g transform="translate(480 0)"><rect x="0" y="282" width="58" height="198" rx="5" fill="#60a5fa"/><text x="29" y="500" text-anchor="middle" class="note" fill="#334155">F</text><text x="29" y="518" text-anchor="middle" class="freq">349.2</text></g>
    <g transform="translate(558 0)"><rect x="0" y="266" width="58" height="214" rx="5" fill="#60a5fa"/><text x="29" y="500" text-anchor="middle" class="note" fill="#334155">F♯</text><text x="29" y="518" text-anchor="middle" class="freq">370.0</text></g>
    <g transform="translate(636 0)"><rect x="0" y="250" width="58" height="230" rx="5" fill="#3b82f6"/><text x="29" y="500" text-anchor="middle" class="note" fill="#1d4ed8">G</text><text x="29" y="518" text-anchor="middle" class="freq">392.0</text></g>
    <g transform="translate(714 0)"><rect x="0" y="234" width="58" height="246" rx="5" fill="#3b82f6"/><text x="29" y="500" text-anchor="middle" class="note" fill="#334155">G♯</text><text x="29" y="518" text-anchor="middle" class="freq">415.3</text></g>
    <g transform="translate(792 0)"><rect x="0" y="218" width="58" height="262" rx="5" fill="#2563eb"/><text x="29" y="500" text-anchor="middle" class="note" fill="#1d4ed8">A4</text><text x="29" y="518" text-anchor="middle" class="freq">440.0</text></g>
    <g transform="translate(870 0)"><rect x="0" y="202" width="58" height="278" rx="5" fill="#2563eb"/><text x="29" y="500" text-anchor="middle" class="note" fill="#334155">A♯</text><text x="29" y="518" text-anchor="middle" class="freq">466.2</text></g>
    <g transform="translate(948 0)"><rect x="0" y="186" width="58" height="294" rx="5" fill="#1d4ed8"/><text x="29" y="500" text-anchor="middle" class="note" fill="#334155">B</text><text x="29" y="518" text-anchor="middle" class="freq">493.9</text></g>
    <g transform="translate(1026 0)"><rect x="0" y="170" width="58" height="310" rx="5" fill="#1d4ed8"/><text x="29" y="500" text-anchor="middle" class="note" fill="#1d4ed8">C5</text><text x="29" y="518" text-anchor="middle" class="freq">523.3</text></g>
  </g>

  <!-- doubling annotation -->
  <line x1="119" y1="150" x2="1055" y2="150" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="119" y="142" class="lab">C4 = 261.6 Hz</text>
  <text x="1055" y="142" text-anchor="end" class="lab">C5 = 523.3 Hz = exactly 2 × C4</text>

  <!-- footer -->
  <g transform="translate(90 556)">
    <rect x="0" y="0" width="1020" height="52" rx="14" fill="#0c2f6b"/>
    <text x="24" y="32" font-family="Consolas, Menlo, monospace" font-size="14" fill="#7ef0c0">f = 440 × 2^((n − 69)/12) — lazytools.io note frequency calculator</text>
  </g>
</svg>
