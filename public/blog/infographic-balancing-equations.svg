<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="Balancing a chemical equation with the algebra method, using H2 plus O2 gives H2O. Step 1: assign an unknown coefficient a, b, c to each species. Step 2: write one conservation equation per element — for hydrogen 2a equals 2c, for oxygen 2b equals c. Step 3: solve the linear system for the smallest whole numbers — a equals 2, b equals 1, c equals 2. Result: 2 H2 plus O2 gives 2 H2O. This is exact integer linear algebra with one right answer, which is why a deterministic tool is reliable where a chatbot guesses.">
  <defs>
    <style>
      .h { font: 800 30px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .sub { font: 500 15px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .step { font: 800 16px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #4338ca; }
      .lab { font: 600 15px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .mono { font: 700 18px Consolas, Menlo, monospace; fill: #0f172a; }
      .monh { font: 800 22px Consolas, Menlo, monospace; fill: #1d4ed8; }
    </style>
  </defs>

  <text x="600" y="44" text-anchor="middle" class="h">Balancing an equation is just algebra</text>
  <text x="600" y="72" text-anchor="middle" class="sub">one unknown per species · one equation per element · solve for whole numbers</text>

  <!-- unbalanced -->
  <g transform="translate(70 96)">
    <rect x="0" y="0" width="1060" height="56" rx="12" fill="#f1f5f9" stroke="#e2e8f0"/>
    <text x="530" y="36" text-anchor="middle" class="mono" font-size="22">a H₂  +  b O₂  →  c H₂O</text>
  </g>

  <!-- step 1 -->
  <g transform="translate(70 172)">
    <rect x="0" y="0" width="340" height="150" rx="14" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/>
    <text x="20" y="34" class="step">1 · Unknown per species</text>
    <text x="20" y="72" class="mono">H₂ → a</text>
    <text x="20" y="100" class="mono">O₂ → b</text>
    <text x="20" y="128" class="mono">H₂O → c</text>
  </g>

  <!-- step 2 -->
  <g transform="translate(430 172)">
    <rect x="0" y="0" width="340" height="150" rx="14" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/>
    <text x="20" y="34" class="step">2 · Balance each element</text>
    <text x="20" y="72" class="lab">Hydrogen:</text><text x="150" y="72" class="mono">2a = 2c</text>
    <text x="20" y="104" class="lab">Oxygen:</text><text x="150" y="104" class="mono">2b = c</text>
    <text x="20" y="136" class="sub">a homogeneous linear system</text>
  </g>

  <!-- step 3 -->
  <g transform="translate(790 172)">
    <rect x="0" y="0" width="340" height="150" rx="14" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
    <text x="20" y="34" class="step">3 · Smallest whole numbers</text>
    <text x="20" y="76" class="monh">a = 2</text>
    <text x="140" y="76" class="monh">b = 1</text>
    <text x="20" y="112" class="monh">c = 2</text>
    <text x="20" y="140" class="sub">scale by LCM ÷ GCD</text>
  </g>

  <!-- result -->
  <g transform="translate(70 348)">
    <rect x="0" y="0" width="1060" height="66" rx="14" fill="#0c2f6b"/>
    <text x="530" y="43" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="26" font-weight="800" fill="#7ef0c0">2 H₂  +  O₂  →  2 H₂O</text>
  </g>

  <!-- why exact -->
  <g transform="translate(70 434)">
    <rect x="0" y="0" width="520" height="150" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="20" y="34" class="step">Why a tool beats a chatbot</text>
    <text x="20" y="66" class="lab">One correct answer — it's linear algebra,</text>
    <text x="20" y="90" class="lab">not a pattern to guess. Exact BigInt</text>
    <text x="20" y="114" class="lab">fractions → integer null-space vector.</text>
    <text x="20" y="140" class="sub">Chatbots mis-apply coefficients on redox.</text>
  </g>
  <g transform="translate(610 434)">
    <rect x="0" y="0" width="520" height="150" rx="14" fill="#fef2f2" stroke="#fecaca" stroke-width="2"/>
    <text x="20" y="34" class="step" fill="#b91c1c">Hard case, done exactly</text>
    <text x="20" y="70" class="mono" font-size="14">KMnO₄ + HCl → KCl + MnCl₂ + H₂O + Cl₂</text>
    <text x="20" y="104" class="monh" font-size="20">2, 16, 2, 2, 8, 5</text>
    <text x="20" y="136" class="sub">6 species, 4 elements — one integer solution.</text>
  </g>
</svg>
