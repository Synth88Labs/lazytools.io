<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="How a Punnett square works for a monohybrid cross Aa by Aa. Each parent makes two kinds of gamete, A and a. The gametes go along the top and side of a two by two grid. Filling the four boxes gives one AA, two Aa and one aa — a genotype ratio of 1 to 2 to 1. Because A is dominant, three of the four show the dominant trait and one shows the recessive trait, a phenotype ratio of 3 to 1. A dihybrid cross AaBb by AaBb uses a four by four grid of sixteen boxes and gives the classic 9 to 3 to 3 to 1 phenotype ratio.">
  <defs>
    <style>
      .h { font: 800 30px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#0f172a; }
      .lab { font: 700 18px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#334155; }
      .sub { font: 500 15px 'Plus Jakarta Sans','Segoe UI',Arial,sans-serif; fill:#64748b; }
      .cell { font: 800 26px Consolas,Menlo,monospace; }
      .hdr { font: 800 24px Consolas,Menlo,monospace; fill:#1e3a8a; }
    </style>
  </defs>

  <text x="600" y="44" text-anchor="middle" class="h">🟩 Punnett square: Aa × Aa</text>

  <!-- grid -->
  <g transform="translate(150 90)">
    <text x="80" y="-16" text-anchor="middle" class="hdr">A</text>
    <text x="160" y="-16" text-anchor="middle" class="hdr">a</text>
    <text x="-30" y="72" text-anchor="middle" class="hdr">A</text>
    <text x="-30" y="152" text-anchor="middle" class="hdr">a</text>
    <rect x="40" y="30" width="80" height="80" fill="#dbeafe" stroke="#94a3b8"/><text x="80" y="88" text-anchor="middle" class="cell" fill="#1e3a8a">AA</text>
    <rect x="120" y="30" width="80" height="80" fill="#e0f2fe" stroke="#94a3b8"/><text x="160" y="88" text-anchor="middle" class="cell" fill="#0369a1">Aa</text>
    <rect x="40" y="110" width="80" height="80" fill="#e0f2fe" stroke="#94a3b8"/><text x="80" y="168" text-anchor="middle" class="cell" fill="#0369a1">Aa</text>
    <rect x="120" y="110" width="80" height="80" fill="#fee2e2" stroke="#94a3b8"/><text x="160" y="168" text-anchor="middle" class="cell" fill="#991b1b">aa</text>
  </g>
  <text x="230" y="330" text-anchor="middle" class="sub">gametes along top &amp; side → fill the boxes</text>

  <!-- ratios -->
  <g transform="translate(500 100)">
    <rect x="0" y="0" width="560" height="90" rx="14" fill="#eff6ff" stroke="#1d87f1" stroke-width="2"/>
    <text x="24" y="36" class="lab" fill="#1e3a8a">Genotype ratio</text>
    <text x="24" y="70" font-family="Consolas,monospace" font-size="24" font-weight="800" fill="#0f172a">1 AA : 2 Aa : 1 aa</text>
  </g>
  <g transform="translate(500 210)">
    <rect x="0" y="0" width="560" height="90" rx="14" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
    <text x="24" y="36" class="lab" fill="#065f46">Phenotype ratio <tspan class="sub">(A is dominant)</tspan></text>
    <text x="24" y="70" font-family="Consolas,monospace" font-size="24" font-weight="800" fill="#0f172a">3 dominant : 1 recessive</text>
  </g>

  <!-- dihybrid note -->
  <g transform="translate(150 370)">
    <rect x="0" y="0" width="910" height="86" rx="14" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="30" y="36" class="lab" fill="#5b21b6">Dihybrid cross: AaBb × AaBb</text>
    <text x="30" y="66" class="sub">A 4×4 grid of 16 boxes gives the classic phenotype ratio <tspan font-family="Consolas,monospace" font-weight="800" fill="#0f172a" font-size="17">9 : 3 : 3 : 1</tspan> — easy to get wrong by hand.</text>
  </g>

  <rect x="150" y="476" width="910" height="112" rx="16" fill="#153056"/>
  <text x="605" y="514" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="17" font-weight="800" fill="#ffffff">Uppercase = dominant allele, lowercase = recessive. An organism shows the dominant</text>
  <text x="605" y="540" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="17" font-weight="800" fill="#ffffff">trait if it carries at least one dominant allele; recessive needs both (aa).</text>
  <text x="605" y="572" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="15" font-weight="700" fill="#7ef0c0">Larger grids are where hand-drawing — and AI chatbots — slip. A computed grid doesn’t.</text>
</svg>
