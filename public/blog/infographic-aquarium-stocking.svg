<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Ten one-inch fish are not equal to one ten-inch fish, because body volume scales with the cube of length. What matters is adult size, bioload, surface area, filtration and territory.">
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="600" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="44" font-weight="800" fill="#0f172a">“10 inches of fish” — but not the same load</text>

  <!-- left: ten small fish -->
  <rect x="70" y="106" width="480" height="240" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
  <text x="310" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#1e3a8a">TEN 1″ TETRAS</text>
  <g fill="#2563eb">
    <ellipse cx="130" cy="196" rx="17" ry="9"/><ellipse cx="190" cy="196" rx="17" ry="9"/>
    <ellipse cx="250" cy="196" rx="17" ry="9"/><ellipse cx="310" cy="196" rx="17" ry="9"/>
    <ellipse cx="370" cy="196" rx="17" ry="9"/><ellipse cx="430" cy="196" rx="17" ry="9"/>
    <ellipse cx="160" cy="234" rx="17" ry="9"/><ellipse cx="220" cy="234" rx="17" ry="9"/>
    <ellipse cx="280" cy="234" rx="17" ry="9"/><ellipse cx="340" cy="234" rx="17" ry="9"/>
  </g>
  <text x="310" y="292" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" fill="#1e3a8a">small total body mass</text>
  <text x="310" y="326" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#166534">modest waste</text>

  <text x="600" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="46" font-weight="800" fill="#94a3b8">≠</text>

  <!-- right: one big fish -->
  <rect x="650" y="106" width="480" height="240" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="4"/>
  <text x="890" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#991b1b">ONE 10″ OSCAR</text>
  <ellipse cx="890" cy="216" rx="96" ry="46" fill="#dc2626"/>
  <polygon points="986,216 1030,190 1030,242" fill="#dc2626"/>
  <circle cx="845" cy="204" r="7" fill="#fff"/>
  <text x="890" y="292" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" fill="#991b1b">~1000× the body volume</text>
  <text x="890" y="326" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#991b1b">far more waste</text>

  <rect x="70" y="372" width="1060" height="84" rx="16" fill="#0f172a"/>
  <text x="600" y="404" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#f8fafc">Waste scales with MASS, not length.</text>
  <text x="600" y="438" text-anchor="middle" font-family="system-ui, sans-serif" font-size="25" fill="#cbd5e1">Double the length ≈ 8× the volume.</text>

  <text x="600" y="504" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" font-weight="800" fill="#0f172a">What actually sets your limit</text>
  <rect x="70" y="524" width="200" height="70" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="170" y="568" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#166534">Adult size</text>
  <rect x="286" y="524" width="200" height="70" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="386" y="568" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#166534">Bioload</text>
  <rect x="502" y="524" width="200" height="70" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="602" y="568" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#166534">Surface area</text>
  <rect x="718" y="524" width="200" height="70" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="818" y="568" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#166534">Filtration</text>
  <rect x="934" y="524" width="196" height="70" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="1032" y="568" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#166534">Territory</text>

  <text x="600" y="648" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#b91c1c">Stock for ADULT size — not the juvenile in the bag.</text>
</svg>
