<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Paver patio cross-section: pavers, 1 inch bedding sand, 4 to 6 inches compacted gravel for a patio or 8 to 12 for a driveway, over compacted subgrade.">
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="600" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="44" font-weight="800" fill="#0f172a">Build it in layers, compact in lifts</text>

  <!-- cross section -->
  <!-- pavers -->
  <rect x="80" y="112" width="620" height="52" fill="#94a3b8" stroke="#475569" stroke-width="3"/>
  <line x1="235" y1="112" x2="235" y2="164" stroke="#475569" stroke-width="3"/>
  <line x1="390" y1="112" x2="390" y2="164" stroke="#475569" stroke-width="3"/>
  <line x1="545" y1="112" x2="545" y2="164" stroke="#475569" stroke-width="3"/>
  <text x="726" y="146" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#334155">PAVERS</text>

  <!-- sand -->
  <rect x="80" y="164" width="620" height="40" fill="#fde68a" stroke="#d97706" stroke-width="3"/>
  <text x="726" y="192" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#b45309">1″ bedding sand</text>
  <text x="726" y="222" font-family="system-ui, sans-serif" font-size="23" fill="#92400e">screeded — never thicker</text>

  <!-- gravel -->
  <rect x="80" y="204" width="620" height="180" fill="#cbd5e1" stroke="#475569" stroke-width="3"/>
  <circle cx="150" cy="250" r="9" fill="#94a3b8"/><circle cx="240" cy="290" r="11" fill="#94a3b8"/>
  <circle cx="340" cy="240" r="8" fill="#94a3b8"/><circle cx="440" cy="300" r="12" fill="#94a3b8"/>
  <circle cx="540" cy="252" r="9" fill="#94a3b8"/><circle cx="630" cy="320" r="10" fill="#94a3b8"/>
  <circle cx="200" cy="350" r="10" fill="#94a3b8"/><circle cx="400" cy="360" r="8" fill="#94a3b8"/>
  <text x="726" y="272" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#334155">COMPACTED GRAVEL</text>
  <text x="726" y="310" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#166534">Patio: 4–6″</text>
  <text x="726" y="344" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#b91c1c">Driveway: 8–12″</text>
  <text x="726" y="376" font-family="system-ui, sans-serif" font-size="23" fill="#475569">in 2–3″ lifts</text>

  <!-- subgrade -->
  <rect x="80" y="384" width="620" height="70" fill="#a16207" stroke="#713f12" stroke-width="3"/>
  <text x="726" y="428" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#713f12">Compacted subgrade</text>

  <!-- slope -->
  <text x="390" y="504" text-anchor="middle" font-family="system-ui, sans-serif" font-size="27" font-weight="700" fill="#334155">Slope 1/4″ per foot (2%) away from the house →</text>

  <rect x="80" y="536" width="1040" height="124" rx="18" fill="#0f172a"/>
  <text x="600" y="582" text-anchor="middle" font-family="system-ui, sans-serif" font-size="29" font-weight="800" fill="#f8fafc">Dig = pavers + 1″ sand + base depth</text>
  <text x="600" y="626" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" fill="#fca5a5">No edge restraint = the patio spreads. It is not optional.</text>
</svg>
