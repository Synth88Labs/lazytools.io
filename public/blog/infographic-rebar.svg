<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="A slab rebar grid at 16 inches on centre with 3 inches of cover, the bar-count formula, and number 4 bar properties.">
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="600" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="44" font-weight="800" fill="#0f172a">Spacing, cover, and the +1</text>

  <!-- slab with grid -->
  <rect x="70" y="112" width="560" height="360" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="4"/>
  <rect x="112" y="154" width="476" height="276" fill="none" stroke="#f59e0b" stroke-width="3" stroke-dasharray="8 6"/>
  <!-- vertical bars -->
  <line x1="112" y1="154" x2="112" y2="430" stroke="#dc2626" stroke-width="6"/>
  <line x1="207" y1="154" x2="207" y2="430" stroke="#dc2626" stroke-width="6"/>
  <line x1="302" y1="154" x2="302" y2="430" stroke="#dc2626" stroke-width="6"/>
  <line x1="397" y1="154" x2="397" y2="430" stroke="#dc2626" stroke-width="6"/>
  <line x1="492" y1="154" x2="492" y2="430" stroke="#dc2626" stroke-width="6"/>
  <line x1="588" y1="154" x2="588" y2="430" stroke="#dc2626" stroke-width="6"/>
  <!-- horizontal bars -->
  <line x1="112" y1="154" x2="588" y2="154" stroke="#dc2626" stroke-width="6"/>
  <line x1="112" y1="246" x2="588" y2="246" stroke="#dc2626" stroke-width="6"/>
  <line x1="112" y1="338" x2="588" y2="338" stroke="#dc2626" stroke-width="6"/>
  <line x1="112" y1="430" x2="588" y2="430" stroke="#dc2626" stroke-width="6"/>

  <text x="350" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="27" font-weight="700" fill="#b45309">dashed = 3″ cover from every edge</text>

  <!-- right panel -->
  <rect x="672" y="112" width="458" height="166" rx="16" fill="#0f172a"/>
  <text x="901" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#94a3b8">BARS PER DIRECTION</text>
  <text x="901" y="212" text-anchor="middle" font-family="system-ui, sans-serif" font-size="31" font-weight="800" fill="#f8fafc">(side − 2 × cover)</text>
  <text x="901" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="31" font-weight="800" fill="#f8fafc">÷ spacing, then + 1</text>

  <rect x="672" y="300" width="458" height="172" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="4"/>
  <text x="901" y="346" text-anchor="middle" font-family="system-ui, sans-serif" font-size="27" font-weight="800" fill="#0f172a">#4 BAR — the default</text>
  <text x="901" y="392" text-anchor="middle" font-family="system-ui, sans-serif" font-size="27" fill="#334155">½″ diameter · 0.668 lb/ft</text>
  <text x="901" y="438" text-anchor="middle" font-family="system-ui, sans-serif" font-size="27" fill="#334155">12–18″ on centre</text>

  <rect x="70" y="540" width="1060" height="120" rx="18" fill="#1e3a8a"/>
  <text x="600" y="586" text-anchor="middle" font-family="system-ui, sans-serif" font-size="29" font-weight="800" fill="#f8fafc">Cover stops rust spalling the slab. Chairs hold bar in the upper third.</text>
  <text x="600" y="628" text-anchor="middle" font-family="system-ui, sans-serif" font-size="27" fill="#bfdbfe">Laps: 40× diameter is a rule of thumb — ACI 318 runs longer.</text>
</svg>
