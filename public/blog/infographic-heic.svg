<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-label="An iPhone saves a photo as HEIC using HEVC compression at about half the size of JPEG. The file opens on Apple devices but fails in web browsers, on Windows without a codec, in many Android apps and on upload forms — because HEVC is patent-encumbered. Converting to JPG makes it open everywhere at a modest size increase.">
  <defs>
    <style>
      .h { font: 800 30px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .lab { font: 700 19px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .sub { font: 500 16px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .tag { font: 700 17px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; }
      .chip { font: 600 16px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <text x="600" y="44" text-anchor="middle" class="h">Half the size, a fraction of the compatibility</text>

  <!-- HEIC source -->
  <g transform="translate(75 90)">
    <rect x="0" y="0" width="300" height="200" rx="16" fill="#eef9ff" stroke="#1d87f1" stroke-width="2"/>
    <text x="150" y="40" text-anchor="middle" class="tag" fill="#153056">📲 iPhone default</text>
    <text x="150" y="80" text-anchor="middle" class="lab">HEIC</text>
    <text x="150" y="108" text-anchor="middle" class="sub">HEVC compression</text>
    <rect x="45" y="128" width="210" height="30" rx="15" fill="#1d87f1"/>
    <text x="150" y="149" text-anchor="middle" class="tag" fill="#ffffff">≈ ½ the size of JPEG</text>
    <text x="150" y="184" text-anchor="middle" class="sub">great on the phone…</text>
  </g>

  <!-- fails everywhere -->
  <g transform="translate(430 90)">
    <rect x="0" y="0" width="695" height="200" rx="16" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="347" y="38" text-anchor="middle" class="tag" fill="#991b1b">…but "won't open" almost everywhere off Apple</text>
    <text x="30" y="78" class="chip">✗ Web browsers — no native display</text>
    <text x="370" y="78" class="chip">✗ Windows — needs a paid codec</text>
    <text x="30" y="112" class="chip">✗ Many Android apps &amp; old software</text>
    <text x="370" y="112" class="chip">✗ Upload forms expecting .jpg</text>
    <rect x="28" y="132" width="639" height="46" rx="12" fill="#dc2626"/>
    <text x="347" y="161" text-anchor="middle" class="tag" fill="#ffffff">Root cause: HEVC is patent-encumbered (JPEG/PNG/WebP are royalty-free)</text>
  </g>

  <!-- fix -->
  <g transform="translate(300 330)">
    <rect x="0" y="0" width="600" height="120" rx="16" fill="#f0fdf4" stroke="#059669" stroke-width="3"/>
    <text x="300" y="44" text-anchor="middle" class="tag" fill="#065f46">Convert HEIC → JPG (in your browser, via libheif)</text>
    <text x="300" y="80" text-anchor="middle" class="chip">opens everywhere · small size increase · quality 85+ looks identical</text>
    <text x="300" y="104" text-anchor="middle" class="sub">or shoot JPEG from the start: iOS Camera → Formats → Most Compatible</text>
  </g>

  <rect x="240" y="500" width="720" height="48" rx="12" fill="#153056"/>
  <text x="600" y="531" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="18" font-weight="600" fill="#7ef0c0">the photo isn't broken — your software just can't decode HEVC</text>
</svg>
