<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="A timeline of vegetable planting centred on the average last spring frost date. Weeks before the frost, on the left: start onions indoors about 10 weeks before, peppers 8 weeks, tomatoes 7 weeks, brassicas 5 weeks. Cool-season crops go out before the frost: peas and spinach direct-sown 5 weeks before, lettuce 3 weeks before, cabbage and onions transplanted 4 weeks before. At the frost line and after, warm-season crops: transplant tomatoes about 1 week after, direct-sow beans and corn at or just after the frost, peppers 2 weeks after. The last frost date is the key reference for the whole vegetable garden.">
  <defs>
    <style>
      .h { font: 800 28px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .sub { font: 500 15px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .wk { font: 700 13px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #94a3b8; }
      .item { font: 600 14px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; }
      .frost { font: 800 16px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #0369a1; }
    </style>
  </defs>

  <text x="600" y="40" text-anchor="middle" class="h">Time your whole garden to the last frost</text>
  <text x="600" y="66" text-anchor="middle" class="sub">weeks before ← average last spring frost → weeks after</text>

  <!-- timeline axis -->
  <line x1="70" y1="150" x2="1130" y2="150" stroke="#cbd5e1" stroke-width="3"/>
  <!-- frost line at x=820 (so ~ -10wk..+3wk maps 70..1130; 0 at 70 + (10/13)*1060 = 885). Let's set: range -10..+3 (13 wk) over 70..1130 => px/wk = 1060/13 = 81.5; x(0)=70+10*81.5=885 -->
  <line x1="885" y1="95" x2="885" y2="470" stroke="#0ea5e9" stroke-width="3" stroke-dasharray="6 5"/>
  <rect x="800" y="70" width="170" height="26" rx="13" fill="#e0f2fe"/>
  <text x="885" y="88" text-anchor="middle" class="frost">❄ LAST FROST</text>

  <!-- week ticks -->
  <g class="wk" text-anchor="middle">
    <text x="152" y="175">−9 wk</text>
    <text x="396" y="175">−6 wk</text>
    <text x="640" y="175">−3 wk</text>
    <text x="885" y="175">frost</text>
    <text x="1048" y="175">+2 wk</text>
  </g>

  <!-- Start indoors (left, green pills) -->
  <text x="70" y="220" class="item" font-weight="800" fill="#15803d">🌱 Start seeds indoors</text>
  <g class="item">
    <rect x="70" y="232" width="150" height="28" rx="14" fill="#dcfce7"/><text x="80" y="251" fill="#15803d">Onions −10 wk</text>
    <rect x="233" y="232" width="145" height="28" rx="14" fill="#dcfce7"/><text x="243" y="251" fill="#15803d">Peppers −8 wk</text>
    <rect x="396" y="232" width="155" height="28" rx="14" fill="#dcfce7"/><text x="406" y="251" fill="#15803d">Tomatoes −7 wk</text>
    <rect x="559" y="232" width="150" height="28" rx="14" fill="#dcfce7"/><text x="569" y="251" fill="#15803d">Brassicas −5 wk</text>
  </g>

  <!-- Sow/transplant cool-season before frost (blue) -->
  <text x="70" y="300" class="item" font-weight="800" fill="#1d4ed8">🪴 Cool-season out (before frost)</text>
  <g class="item">
    <rect x="396" y="312" width="185" height="28" rx="14" fill="#dbeafe"/><text x="406" y="331" fill="#1d4ed8">Peas / spinach −5 wk</text>
    <rect x="600" y="312" width="150" height="28" rx="14" fill="#dbeafe"/><text x="610" y="331" fill="#1d4ed8">Onions −4 wk</text>
    <rect x="640" y="348" width="150" height="28" rx="14" fill="#dbeafe"/><text x="650" y="367" fill="#1d4ed8">Lettuce −3 wk</text>
  </g>

  <!-- Warm-season at/after frost (amber) -->
  <text x="70" y="416" class="item" font-weight="800" fill="#b45309">🌾 Warm-season out (after frost)</text>
  <g class="item">
    <rect x="885" y="428" width="170" height="28" rx="14" fill="#fef3c7"/><text x="895" y="447" fill="#b45309">Beans / corn: at frost</text>
    <rect x="915" y="464" width="180" height="28" rx="14" fill="#fef3c7"/><text x="925" y="483" fill="#b45309">Tomatoes +1 wk after</text>
    <rect x="960" y="500" width="150" height="28" rx="14" fill="#fef3c7"/><text x="970" y="519" fill="#b45309">Peppers +2 wk</text>
  </g>

  <!-- footer -->
  <g transform="translate(70 556)">
    <rect x="0" y="0" width="1060" height="52" rx="14" fill="#0c2f6b"/>
    <text x="24" y="32" font-family="Consolas, Menlo, monospace" font-size="14" fill="#7ef0c0">lazytools.io — planting date calculator: enter your frost date, get every sowing date</text>
  </g>
</svg>
