<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="How the interest and principal split of an EMI changes over a 20-year loan at 9 percent">
  <defs>
    <linearGradient id="int" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="prin" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2fc98e"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <style>
      .h { font: 800 30px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .row { font: 700 21px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .pct { font: 700 19px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .leg { font: 600 19px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #475569; }
    </style>
  </defs>

  <text x="600" y="46" text-anchor="middle" class="h">Where each EMI payment goes — 20-year loan at 9%</text>

  <!-- legend -->
  <rect x="380" y="70" width="22" height="22" rx="5" fill="url(#int)"/>
  <text x="410" y="87" class="leg">interest (bank's share)</text>
  <rect x="660" y="70" width="22" height="22" rx="5" fill="url(#prin)"/>
  <text x="690" y="87" class="leg">principal (your equity)</text>

  <!-- rows: label x=60..250, bar x=260 width 700*share -->
  <!-- Month 1: 83/17 -->
  <text x="240" y="160" text-anchor="end" class="row">Month 1</text>
  <rect x="260" y="135" width="581" height="40" rx="8" fill="url(#int)"/>
  <rect x="845" y="135" width="115" height="40" rx="8" fill="url(#prin)"/>
  <text x="550" y="162" text-anchor="middle" class="pct">83% interest</text>
  <text x="902" y="162" text-anchor="middle" class="pct">17%</text>

  <!-- Year 5: 76/24 -->
  <text x="240" y="250" text-anchor="end" class="row">Year 5</text>
  <rect x="260" y="225" width="532" height="40" rx="8" fill="url(#int)"/>
  <rect x="796" y="225" width="164" height="40" rx="8" fill="url(#prin)"/>
  <text x="526" y="252" text-anchor="middle" class="pct">76%</text>
  <text x="878" y="252" text-anchor="middle" class="pct">24%</text>

  <!-- Year 10: 63/37 -->
  <text x="240" y="340" text-anchor="end" class="row">Year 10</text>
  <rect x="260" y="315" width="441" height="40" rx="8" fill="url(#int)"/>
  <rect x="705" y="315" width="255" height="40" rx="8" fill="url(#prin)"/>
  <text x="480" y="342" text-anchor="middle" class="pct">63%</text>
  <text x="832" y="342" text-anchor="middle" class="pct">37%</text>

  <!-- Year 15: 42/58 -->
  <text x="240" y="430" text-anchor="end" class="row">Year 15</text>
  <rect x="260" y="405" width="294" height="40" rx="8" fill="url(#int)"/>
  <rect x="558" y="405" width="402" height="40" rx="8" fill="url(#prin)"/>
  <text x="407" y="432" text-anchor="middle" class="pct">42%</text>
  <text x="759" y="432" text-anchor="middle" class="pct">58% principal</text>

  <!-- Final year: 5/95 -->
  <text x="240" y="520" text-anchor="end" class="row">Final year</text>
  <rect x="260" y="495" width="35" height="40" rx="8" fill="url(#int)"/>
  <rect x="299" y="495" width="661" height="40" rx="8" fill="url(#prin)"/>
  <text x="629" y="522" text-anchor="middle" class="pct">95% principal</text>

  <!-- formula footer -->
  <rect x="180" y="572" width="840" height="50" rx="12" fill="#153056"/>
  <text x="600" y="605" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="24" font-weight="600" fill="#7ef0c0">EMI = P·r·(1+r)ⁿ ÷ ((1+r)ⁿ − 1)</text>
</svg>
