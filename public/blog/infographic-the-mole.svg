<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="The mole connects three quantities. Mass in grams divided by molar mass (grams per mole) gives moles; moles times Avogadro's number, 6.022 times ten to the 23, gives the number of particles. One mole of any substance is its molar mass in grams and contains 6.022 times ten to the 23 particles. Example: 18.015 grams of water is 1 mole, which is 6.022 times ten to the 23 molecules. The mole is the central hub for converting between mass, amount and particle count in stoichiometry.">
  <defs>
    <style>
      .h { font: 800 30px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .sub { font: 500 15px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .box { font: 800 20px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; }
      .boxs { font: 600 13px 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .op { font: 700 15px Consolas, Menlo, monospace; fill: #334155; }
      .mono { font: 700 15px Consolas, Menlo, monospace; fill: #0f172a; }
    </style>
  </defs>

  <text x="600" y="44" text-anchor="middle" class="h">The mole — the hub that links mass, amount and count</text>
  <text x="600" y="72" text-anchor="middle" class="sub">divide by molar mass to get moles; multiply by Avogadro’s number to get particles</text>

  <!-- three boxes -->
  <g transform="translate(70 120)">
    <rect x="0" y="40" width="270" height="120" rx="16" fill="#eff6ff" stroke="#1d87f1" stroke-width="2"/>
    <text x="135" y="90" text-anchor="middle" class="box" fill="#1d4ed8">Mass</text>
    <text x="135" y="118" text-anchor="middle" class="boxs">grams (g)</text>
    <text x="135" y="140" text-anchor="middle" class="mono">18.015 g H₂O</text>
  </g>
  <g transform="translate(465 120)">
    <rect x="0" y="40" width="270" height="120" rx="16" fill="#eef2ff" stroke="#4338ca" stroke-width="3"/>
    <text x="135" y="90" text-anchor="middle" class="box" fill="#3730a3">Moles</text>
    <text x="135" y="118" text-anchor="middle" class="boxs">mol</text>
    <text x="135" y="140" text-anchor="middle" class="mono">1 mol</text>
  </g>
  <g transform="translate(860 120)">
    <rect x="0" y="40" width="270" height="120" rx="16" fill="#f0fdf4" stroke="#0e9f6e" stroke-width="2"/>
    <text x="135" y="90" text-anchor="middle" class="box" fill="#15803d">Particles</text>
    <text x="135" y="118" text-anchor="middle" class="boxs">molecules / atoms</text>
    <text x="135" y="140" text-anchor="middle" class="mono">6.022×10²³</text>
  </g>

  <!-- arrows + operations -->
  <g transform="translate(0 180)">
    <line x1="340" y1="20" x2="465" y2="20" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
    <line x1="465" y1="48" x2="340" y2="48" stroke="#cbd5e1" stroke-width="2" marker-end="url(#a)"/>
    <text x="402" y="12" text-anchor="middle" class="op">÷ molar mass</text>
    <text x="402" y="68" text-anchor="middle" class="op" fill="#94a3b8">× molar mass</text>

    <line x1="735" y1="20" x2="860" y2="20" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
    <line x1="860" y1="48" x2="735" y2="48" stroke="#cbd5e1" stroke-width="2" marker-end="url(#a)"/>
    <text x="797" y="12" text-anchor="middle" class="op">× Avogadro</text>
    <text x="797" y="68" text-anchor="middle" class="op" fill="#94a3b8">÷ Avogadro</text>
  </g>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker></defs>

  <!-- key facts -->
  <g transform="translate(70 340)">
    <rect x="0" y="0" width="520" height="110" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="20" y="34" class="op" fill="#1d4ed8">One mole =</text>
    <text x="20" y="64" class="mono">• the molar mass in grams</text>
    <text x="20" y="90" class="mono">• 6.02214076×10²³ particles</text>
  </g>
  <g transform="translate(610 340)">
    <rect x="0" y="0" width="520" height="110" rx="14" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/>
    <text x="20" y="34" class="op" fill="#3730a3">Worked example — water</text>
    <text x="20" y="64" class="mono">18.015 g ÷ 18.015 g/mol = 1 mol</text>
    <text x="20" y="90" class="mono">1 mol × 6.022×10²³ = 6.022×10²³ molecules</text>
  </g>

  <!-- footer -->
  <g transform="translate(70 470)">
    <rect x="0" y="0" width="1060" height="60" rx="14" fill="#0c2f6b"/>
    <text x="24" y="38" font-family="Consolas, Menlo, monospace" font-size="15" fill="#7ef0c0">lazytools.io — mole, molar-mass &amp; stoichiometry calculators, computed in your browser</text>
  </g>
</svg>
