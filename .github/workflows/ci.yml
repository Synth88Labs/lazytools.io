name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Factors audit (NIST/BIPM fixtures)
        run: npm test
      - run: npm run build
      - name: Check page count
        run: |
          COUNT=$(find dist -name "index.html" | wc -l)
          echo "Built $COUNT pages"
          test "$COUNT" -gt 100
