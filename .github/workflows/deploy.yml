# Deploys the static build to Namecheap shared hosting via FTPS.
# Secrets FTP_SERVER / FTP_USERNAME / FTP_PASSWORD must be configured
# in repo Settings → Secrets and variables → Actions.
# Triggered manually or by pushing a version tag (per ROADMAP.md, first run ~July 25, 2026).
name: Deploy to Namecheap

# NOTE: tag-triggered deploys get enabled in launch week (see ROADMAP.md),
# once FTP secrets are configured and the pipeline has a successful dry run.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Deploy dist/ via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: dist/
          server-dir: public_html/
