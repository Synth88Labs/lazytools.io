# Deploys the static build to Namecheap shared hosting via explicit FTPS (port 21).
# Secrets FTP_SERVER / FTP_USERNAME / FTP_PASSWORD are configured in
# repo Settings → Secrets and variables → Actions.
#
# The FTP account is domain-scoped (CLAUDE_ACC@lazytools.io), so its root IS the
# lazytools.io docroot — hence server-dir "./".
# security: loose because shared-hosting FTPS certs are issued for the server
# hostname, not ftp.<domain> (traffic is still TLS-encrypted).
#
# NOTE: tag-triggered deploys get enabled once the pipeline has a clean dry run
# and launch week arrives (see ROADMAP.md).
name: Deploy to Namecheap

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'List changes without uploading anything'
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Refresh tool ratings from production (fail-safe)
        run: node scripts/fetch-ratings.mjs
      - run: npm run build
      - name: Deploy dist/ via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose
          local-dir: dist/
          server-dir: ./
          dry-run: ${{ inputs.dry-run == true }}
